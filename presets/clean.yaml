id: clean
name: Clean (Fender '65 Deluxe Reverb)
blocks:
- type: utility
  enabled: false
  model: tuner_chromatic
  params:
    reference_hz: 440.0
- type: filter
  enabled: true
  model: native_guitar_eq
  params:
    low: 0.0
    low_mid: 0.0
    high_mid: 0.0
    high: 0.0
- type: dynamics
  enabled: true
  model: compressor_studio_clean
  params:
    threshold: 50.0
    ratio: 25.0
    attack_ms: 8.0
    release_ms: 100.0
    makeup_gain: 40.0
    mix: 50.0
- type: amp
  enabled: true
  model: nam_fender_deluxe_reverb_65
  params:
    mic: sm57_royer
- type: reverb
  enabled: true
  model: spring
  params:
    room_size: 35.0
    damping: 55.0
    mix: 18.0
- type: dynamics
  enabled: true
  model: limiter_brickwall
  params:
    threshold: -1.0
    ceiling: -0.1
    release_ms: 50.0
- type: gain
  enabled: true
  model: volume
  params:
    volume: 82.0
    mute: false
- type: utility
  enabled: true
  model: spectrum_analyzer
  params: {}
