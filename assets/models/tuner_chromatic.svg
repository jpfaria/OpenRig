<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Chromatic tuner: musical note with tuning needle indicator -->
  <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Tuner display arc -->
    <path d="M16,60 A30,30 0 0,1 64,60" />
    <!-- Tick marks: left (flat), center (in-tune), right (sharp) -->
    <line x1="16" y1="60" x2="19" y2="52" />
    <line x1="30" y1="35" x2="32" y2="42" />
    <line x1="40" y1="30" x2="40" y2="38" stroke-width="2" />
    <line x1="50" y1="35" x2="48" y2="42" />
    <line x1="64" y1="60" x2="61" y2="52" />
    <!-- Needle pointing straight up (in tune) -->
    <line x1="40" y1="60" x2="40" y2="34" stroke-width="2" />
    <!-- Pivot -->
    <circle cx="40" cy="60" r="2.5" />
    <!-- Musical note stem & head to indicate pitch -->
    <ellipse cx="40" cy="70" rx="5" ry="3.5" transform="rotate(-15 40 70)" />
    <line x1="44.5" y1="68.5" x2="44.5" y2="58" />
    <path d="M44.5,58 C50,55 52,58 48,60" stroke-width="1" />
  </g>
</svg>
