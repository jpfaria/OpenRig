<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Wah pedal: tilted rectangle rocker pedal shape -->
  <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Pedal housing (tilted rectangle) -->
    <path d="M18,68 L22,14 L58,14 L62,68 Z" />
    <!-- Rocker pivot line -->
    <line x1="18" y1="50" x2="62" y2="50" />
    <!-- Rocker pad (top pressed down) -->
    <rect x="26" y="18" width="28" height="14" rx="2" />
    <!-- Treadle lines suggesting rocking motion -->
    <line x1="30" y1="56" x2="50" y2="56" />
    <line x1="32" y1="62" x2="48" y2="62" />
    <!-- Expression arc suggesting wah sweep -->
    <path d="M12,62 C10,50 10,30 12,18" stroke-width="1" opacity="0.5" />
  </g>
</svg>
