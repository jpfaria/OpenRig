<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Compressor: VU meter with needle -->
  <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Meter housing -->
    <rect x="12" y="20" width="56" height="44" rx="4" />
    <!-- Scale arc -->
    <path d="M20,56 A26,26 0 0,1 60,56" />
    <!-- Tick marks on scale -->
    <line x1="20" y1="56" x2="22" y2="50" />
    <line x1="27" y1="42" x2="30" y2="46" />
    <line x1="40" y1="30" x2="40" y2="35" />
    <line x1="53" y1="42" x2="50" y2="46" />
    <line x1="60" y1="56" x2="58" y2="50" />
    <!-- Needle pointing right (high level) -->
    <line x1="40" y1="56" x2="54" y2="38" stroke-width="2" />
    <!-- Needle pivot -->
    <circle cx="40" cy="56" r="2.5" />
  </g>
</svg>
