<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Slapback: two parallel sound waves close together (quick echo) -->
  <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Wave 1 (main) -->
    <path d="M10,40 C15,28 21,28 26,40 C31,52 37,52 42,40 C47,28 53,28 58,40" />
    <!-- Wave 2 (echo, slightly offset and smaller) -->
    <path d="M16,44 C21,35 26,35 31,44 C36,53 41,53 46,44 C51,35 56,35 61,44" stroke-width="1" opacity="0.55" />
  </g>
</svg>
