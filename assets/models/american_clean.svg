<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- American clean: speaker cone with smooth clean wave -->
  <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Speaker cone -->
    <circle cx="36" cy="42" r="22" />
    <circle cx="36" cy="42" r="8" />
    <circle cx="36" cy="42" r="3" />
    <!-- Cone lines -->
    <line x1="36" y1="20" x2="36" y2="34" stroke-width="1" opacity="0.5" />
    <line x1="14" y1="42" x2="28" y2="42" stroke-width="1" opacity="0.5" />
    <!-- Clean smooth wave emanating right -->
    <path d="M62,34 C65,34 67,38 67,42 C67,46 65,50 62,50" />
    <path d="M66,30 C71,30 74,35 74,42 C74,49 71,54 66,54" />
