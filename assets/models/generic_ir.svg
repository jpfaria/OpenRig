<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Generic IR: impulse response — sharp spike waveform -->
  <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Baseline -->
    <line x1="8" y1="52" x2="72" y2="52" />
    <!-- Flat before impulse -->
    <line x1="8" y1="52" x2="28" y2="52" />
    <!-- Main spike -->
    <polyline points="28,52 32,52 36,14 40,52" stroke-width="2" />
    <!-- Decaying oscillation after -->
    <path d="M40,52 C42,42 44,42 46,52 C48,62 50,62 52,52 C54,44 56,44 58,52 C59,57 61,57 62,52" stroke-width="1" />
    <!-- Flat tail -->
    <line x1="62" y1="52" x2="72" y2="52" />
  </g>
</svg>
