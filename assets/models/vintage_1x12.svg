<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Vintage 1x12 cabinet: small cabinet with one speaker -->
  <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cabinet housing (slightly smaller / vintage proportions) -->
    <rect x="12" y="14" width="56" height="56" rx="4" />
    <!-- Single speaker centered -->
    <circle cx="40" cy="42" r="22" />
    <circle cx="40" cy="42" r="8" />
    <circle cx="40" cy="42" r="3" />
    <!-- Cone detail lines -->
    <line x1="40" y1="20" x2="40" y2="34" stroke-width="1" opacity="0.4" />
    <line x1="18" y1="42" x2="32" y2="42" stroke-width="1" opacity="0.4" />
    <line x1="48" y1="42" x2="62" y2="42" stroke-width="1" opacity="0.4" />
    <!-- Handle on top -->
    <path d="M32,14 C32,10 48,10 48,14" />
  </g>
</svg>
