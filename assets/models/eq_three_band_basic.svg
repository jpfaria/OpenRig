<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- EQ three band: frequency response curve with 3 peaks -->
  <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Baseline / zero line -->
    <line x1="8" y1="55" x2="72" y2="55" stroke-width="1" opacity="0.4" />
    <!-- EQ curve with 3 humps (bass, mid, treble) -->
    <path d="M8,55 C12,55 14,48 18,38 C22,28 26,28 30,38 C34,48 36,55 40,55 C43,55 45,42 49,32 C53,22 57,22 61,32 C65,42 67,48 70,48 C71,46 72,45 72,45" />
    <!-- Vertical axis hint -->
    <line x1="8" y1="18" x2="8" y2="60" stroke-width="1" opacity="0.4" />
  </g>
</svg>
