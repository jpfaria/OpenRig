# Tone Doctor genre calibration manifest (#809).
#
# Maps each reference-stem song folder (~/.openrig/evaluations/<song>/refs/) to a
# genre. The genre is NOT on disk — the calibration tool
# (`openrig-tone-calibrate`) reads this map to group stems and derive per-genre
# `mud` / `fizz` / `harsh` / `boom` / `clip` / `thin` / `squash` limits.
#
# Genres are SOURCED, not guessed — each label comes from a reference (Wikipedia
# infobox / Billboard / AllMusic) for that specific recording. Where a recording
# differs from the artist's usual style, it is labeled for its own tone:
#   - john-mayer-xo, silverchair-shade  → acoustic (stripped/clean ballads)
#   - beat-it-michael-jackson           → hard-rock (Eddie Van Halen solo)
# Many genres have only 1–2 stems, so the generated table flags them provisional.

