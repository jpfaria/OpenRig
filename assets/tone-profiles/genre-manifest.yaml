# Tone Doctor genre calibration manifest (#809).
#
# Maps each reference-stem song folder (~/.openrig/evaluations/<song>/refs/) to a
# genre. The genre is NOT on disk — the calibration tool
# (`openrig-tone-calibrate`) reads this map to group stems and derive per-genre
# limits.
#
# Each genre is the PRIMARY genre in the Wikipedia infobox of that specific
# song's article — fetched and quoted directly, not guessed and not inferred
# from prose ("acoustic" is an arrangement, not a genre, so it is not used).
# Genre is per-RECORDING, not per-band: "Enter Sandman" is heavy-metal (the
# Black Album's move away from thrash), "Everlong" is alternative-rock — even
# though the bands are famous for thrash / punk roots.
#
# Two songs have no genre in their own infobox; the source is named:
#   - john-mayer-heartbreak-warfare: pop-rock (from the album Battle Studies)
#   - segredos-torcuato-mariano:     mpb (from the artist's infobox)
#
# Fine granularity (16 genres, several n=1-2 → provisional) is the honest cost of
# sourcing per recording; grouping into families is a later slicing choice.

