assets:
  controls: assets/amps/native/modern-high-gain/controls.svg

controls:
  - id: ctrl-input-db
    label: Input
    section: Input
    type: knob
    param_key: input_db
    default: 0.0
    min: -18.0
    max: 18.0
    svg_cx: 44
    svg_cy: 90

  - id: ctrl-gain
    label: Gain
    section: Amp
    type: knob
    param_key: gain
    default: 72.0
    min: 0.0
    max: 100.0
    svg_cx: 130
    svg_cy: 90

  - id: ctrl-bass
    label: Bass
    section: EQ
    type: knob
    param_key: bass
    default: 50.0
    min: 0.0
    max: 100.0
    svg_cx: 222
    svg_cy: 90

  - id: ctrl-middle
    label: Middle
    section: EQ
    type: knob
    param_key: middle
    default: 50.0
    min: 0.0
    max: 100.0
    svg_cx: 302
    svg_cy: 90

  - id: ctrl-treble
    label: Treble
    section: EQ
    type: knob
    param_key: treble
    default: 50.0
    min: 0.0
    max: 100.0
    svg_cx: 382
    svg_cy: 90

  - id: ctrl-presence
    label: Presence
    section: Power
    type: knob
    param_key: presence
    default: 62.0
    min: 0.0
    max: 100.0
    svg_cx: 470
    svg_cy: 90

  - id: ctrl-depth
    label: Depth
    section: Power
    type: knob
    param_key: depth
    default: 60.0
    min: 0.0
    max: 100.0
    svg_cx: 550
    svg_cy: 90

  - id: ctrl-sag
    label: Sag
    section: Power
    type: knob
    param_key: sag
    default: 30.0
    min: 0.0
    max: 100.0
    svg_cx: 630
    svg_cy: 90

  - id: ctrl-master
    label: Master
    section: Power
    type: knob
    param_key: master
    default: 62.0
    min: 0.0
    max: 100.0
    svg_cx: 706
    svg_cy: 90

  - id: ctrl-bright
    label: Bright
    section: Switches
    type: toggle
    param_key: bright
    default: false
    svg_cx: 767
    svg_cy: 90
