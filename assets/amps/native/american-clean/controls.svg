<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#262626"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>

  <!-- Painel -->
  <rect x="0" y="0" width="800" height="200" rx="4" fill="url(#panel)"/>
  <rect x="0" y="0" width="800" height="4" fill="#b0b0b0" opacity="0.3"/>
  <rect x="0" y="196" width="800" height="4" fill="#b0b0b0" opacity="0.2"/>

  <!-- INPUT section -->
  <text x="44" y="20" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="#707070" letter-spacing="1.5" text-anchor="middle">INPUT</text>
  <line x1="8" y1="24" x2="82" y2="24" stroke="#3a3a3a" stroke-width="0.5"/>

  <circle id="ctrl-input-db" cx="44" cy="90" r="16" fill="#111" stroke="#505050" stroke-width="1.5"/>
  <text x="44" y="120" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">INPUT</text>

  <line x1="84" y1="8" x2="84" y2="192" stroke="#303030" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- AMP section -->
  <text x="130" y="20" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="#707070" letter-spacing="1.5" text-anchor="middle">AMP</text>
  <line x1="86" y1="24" x2="176" y2="24" stroke="#3a3a3a" stroke-width="0.5"/>

  <circle id="ctrl-gain" cx="130" cy="90" r="22" fill="#111" stroke="#505050" stroke-width="1.5"/>
  <text x="130" y="128" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">GAIN</text>

  <line x1="178" y1="8" x2="178" y2="192" stroke="#303030" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- EQ section -->
  <text x="302" y="20" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="#707070" letter-spacing="1.5" text-anchor="middle">EQ</text>
  <line x1="180" y1="24" x2="426" y2="24" stroke="#3a3a3a" stroke-width="0.5"/>

  <circle id="ctrl-bass"   cx="222" cy="90" r="22" fill="#111" stroke="#505050" stroke-width="1.5"/>
  <text x="222" y="128" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">BASS</text>

  <circle id="ctrl-middle" cx="302" cy="90" r="22" fill="#111" stroke="#505050" stroke-width="1.5"/>
  <text x="302" y="128" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">MIDDLE</text>

  <circle id="ctrl-treble" cx="382" cy="90" r="22" fill="#111" stroke="#505050" stroke-width="1.5"/>
  <text x="382" y="128" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">TREBLE</text>

  <line x1="428" y1="8" x2="428" y2="192" stroke="#303030" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- POWER section -->
  <text x="580" y="20" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="#707070" letter-spacing="1.5" text-anchor="middle">POWER</text>
  <line x1="430" y1="24" x2="732" y2="24" stroke="#3a3a3a" stroke-width="0.5"/>

  <circle id="ctrl-presence" cx="470" cy="90" r="22" fill="#111" stroke="#505050" stroke-width="1.5"/>
  <text x="470" y="128" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">PRESENCE</text>

  <circle id="ctrl-depth" cx="550" cy="90" r="22" fill="#111" stroke="#505050" stroke-width="1.5"/>
  <text x="550" y="128" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">DEPTH</text>

  <circle id="ctrl-sag" cx="630" cy="90" r="22" fill="#111" stroke="#505050" stroke-width="1.5"/>
  <text x="630" y="128" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">SAG</text>

  <circle id="ctrl-master" cx="706" cy="90" r="22" fill="#111" stroke="#505050" stroke-width="1.5"/>
  <text x="706" y="128" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">MASTER</text>

  <line x1="734" y1="8" x2="734" y2="192" stroke="#303030" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- SWITCHES section -->
  <text x="767" y="20" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="#707070" letter-spacing="1.5" text-anchor="middle">SW</text>
  <line x1="736" y1="24" x2="800" y2="24" stroke="#3a3a3a" stroke-width="0.5"/>

  <!-- BRIGHT toggle -->
  <g id="ctrl-bright" transform="translate(767,90)">
    <rect x="-12" y="-20" width="24" height="40" rx="3" fill="#0e0e0e" stroke="#404040" stroke-width="1"/>
    <rect x="-8"  y="-16" width="16" height="18" rx="2" fill="#d0d0d0" stroke="#aaa" stroke-width="0.5"/>
    <text y="36" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">BRIGHT</text>
  </g>
</svg>
