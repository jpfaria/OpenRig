<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" width="800" height="700">
  <defs>
    <!-- Diamond grill cloth pattern -->
    <pattern id="diamond-grill" patternUnits="userSpaceOnUse" width="24" height="24" patternTransform="rotate(0)">
      <rect width="24" height="24" fill="#c4aa6a"/>
      <polygon points="12,0 24,12 12,24 0,12" fill="#b89a58" opacity="0.6"/>
      <polygon points="12,2 22,12 12,22 2,12" fill="none" stroke="#a08848" stroke-width="0.5"/>
    </pattern>

    <!-- Knob gradient -->
    <radialGradient id="knob-grad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#5a5a5a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </radialGradient>

    <!-- Chrome gradient -->
    <linearGradient id="chrome-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="50%" stop-color="#b0b0b0"/>
      <stop offset="100%" stop-color="#d0d0d0"/>
    </linearGradient>

    <!-- Panel gradient -->
    <linearGradient id="panel-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#222222"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>

    <!-- Body gradient -->
    <linearGradient id="body-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#252525"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>

    <!-- Grill shadow -->
    <filter id="inner-shadow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- CABINET BODY -->
  <!-- ══════════════════════════════════════════════════════ -->
  <rect x="20" y="20" width="760" height="660" rx="18" ry="18" fill="url(#body-grad)" stroke="#333" stroke-width="2"/>

  <!-- Corner chrome protectors -->
  <rect x="20" y="20" width="32" height="32" rx="4" fill="url(#chrome-grad)" opacity="0.8"/>
  <rect x="748" y="20" width="32" height="32" rx="4" fill="url(#chrome-grad)" opacity="0.8"/>
  <rect x="20" y="648" width="32" height="32" rx="4" fill="url(#chrome-grad)" opacity="0.8"/>
  <rect x="748" y="648" width="32" height="32" rx="4" fill="url(#chrome-grad)" opacity="0.8"/>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- TOP HANDLE -->
  <!-- ══════════════════════════════════════════════════════ -->
  <rect x="310" y="8" width="180" height="28" rx="14" fill="url(#chrome-grad)" stroke="#999" stroke-width="1"/>
  <rect x="318" y="14" width="164" height="16" rx="8" fill="none" stroke="#888" stroke-width="1.5"/>
  <circle cx="320" cy="22" r="5" fill="#aaa"/>
  <circle cx="480" cy="22" r="5" fill="#aaa"/>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- CONTROL PANEL -->
  <!-- ══════════════════════════════════════════════════════ -->
  <rect x="30" y="44" width="740" height="148" rx="4" fill="url(#panel-grad)" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Panel top chrome strip -->
  <rect x="30" y="44" width="740" height="6" rx="2" fill="url(#chrome-grad)" opacity="0.4"/>

  <!-- Section: Normal Channel -->
  <text x="62" y="62" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#888" letter-spacing="1" text-anchor="middle">NORMAL</text>
  <line x1="32" y1="66" x2="116" y2="66" stroke="#444" stroke-width="0.5"/>

  <!-- Normal: Volume -->
  <g id="ctrl-normal-volume" transform="translate(62,110)">
    <circle r="18" fill="url(#knob-grad)" stroke="#444" stroke-width="1.5"/>
    <circle r="13" fill="none" stroke="#333" stroke-width="1"/>
    <!-- Pointer mark at 7 o'clock (min) -->
    <line x1="0" y1="0" x2="-7" y2="12" stroke="#c8c8c8" stroke-width="2" stroke-linecap="round"/>
    <circle r="3" fill="#c8c8c8"/>
    <text y="30" font-family="Arial, sans-serif" font-size="8" fill="#777" text-anchor="middle">VOL</text>
  </g>

  <!-- Normal: Bass -->
  <g id="ctrl-normal-bass" transform="translate(108,98)">
    <circle r="14" fill="url(#knob-grad)" stroke="#444" stroke-width="1.5"/>
    <circle r="3" fill="#bbb"/>
    <text y="22" font-family="Arial, sans-serif" font-size="7" fill="#666" text-anchor="middle">BASS</text>
  </g>

  <!-- Normal: Treble -->
  <g id="ctrl-normal-treble" transform="translate(140,98)">
    <circle r="14" fill="url(#knob-grad)" stroke="#444" stroke-width="1.5"/>
    <circle r="3" fill="#bbb"/>
    <text y="22" font-family="Arial, sans-serif" font-size="7" fill="#666" text-anchor="middle">TREBLE</text>
  </g>

  <!-- Divider -->
  <line x1="168" y1="50" x2="168" y2="188" stroke="#333" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Section: Top Boost -->
  <text x="260" y="62" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#d4a017" letter-spacing="1" text-anchor="middle">TOP BOOST</text>
  <line x1="172" y1="66" x2="356" y2="66" stroke="#d4a017" stroke-width="0.5" opacity="0.5"/>

  <!-- Top Boost: Volume -->
  <g id="ctrl-tb-volume" transform="translate(200,110)">
    <circle r="20" fill="url(#knob-grad)" stroke="#d4a017" stroke-width="2"/>
    <circle r="14" fill="none" stroke="#444" stroke-width="1"/>
    <line x1="0" y1="-8" x2="0" y2="-16" stroke="#d4a017" stroke-width="2.5" stroke-linecap="round"/>
    <circle r="3.5" fill="#d4a017"/>
    <text y="32" font-family="Arial, sans-serif" font-size="8" fill="#d4a017" text-anchor="middle" font-weight="700">VOL</text>
  </g>

  <!-- Top Boost: Bass -->
  <g id="ctrl-tb-bass" transform="translate(254,110)">
    <circle r="18" fill="url(#knob-grad)" stroke="#555" stroke-width="1.5"/>
    <line x1="0" y1="-7" x2="0" y2="-14" stroke="#c8c8c8" stroke-width="2" stroke-linecap="round"/>
    <circle r="3" fill="#bbb"/>
    <text y="28" font-family="Arial, sans-serif" font-size="8" fill="#777" text-anchor="middle">BASS</text>
  </g>

  <!-- Top Boost: Treble -->
  <g id="ctrl-tb-treble" transform="translate(306,110)">
    <circle r="18" fill="url(#knob-grad)" stroke="#555" stroke-width="1.5"/>
    <line x1="0" y1="-7" x2="0" y2="-14" stroke="#c8c8c8" stroke-width="2" stroke-linecap="round"/>
    <circle r="3" fill="#bbb"/>
    <text y="28" font-family="Arial, sans-serif" font-size="8" fill="#777" text-anchor="middle">TREBLE</text>
  </g>

  <!-- Top Boost: Cut -->
  <g id="ctrl-tb-cut" transform="translate(354,110)">
    <circle r="18" fill="url(#knob-grad)" stroke="#555" stroke-width="1.5"/>
    <line x1="0" y1="-7" x2="0" y2="-14" stroke="#c8c8c8" stroke-width="2" stroke-linecap="round"/>
    <circle r="3" fill="#bbb"/>
    <text y="28" font-family="Arial, sans-serif" font-size="8" fill="#777" text-anchor="middle">CUT</text>
  </g>

  <!-- Divider -->
  <line x1="388" y1="50" x2="388" y2="188" stroke="#333" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Section: Vibrato/Tremolo -->
  <text x="440" y="62" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#888" letter-spacing="1" text-anchor="middle">VIBRATO</text>
  <line x1="392" y1="66" x2="496" y2="66" stroke="#444" stroke-width="0.5"/>

  <!-- Vibrato: Speed -->
  <g id="ctrl-vibrato-speed" transform="translate(416,110)">
    <circle r="18" fill="url(#knob-grad)" stroke="#555" stroke-width="1.5"/>
    <line x1="0" y1="-7" x2="0" y2="-14" stroke="#c8c8c8" stroke-width="2" stroke-linecap="round"/>
    <circle r="3" fill="#bbb"/>
    <text y="28" font-family="Arial, sans-serif" font-size="8" fill="#777" text-anchor="middle">SPEED</text>
  </g>

  <!-- Vibrato: Depth -->
  <g id="ctrl-vibrato-depth" transform="translate(466,110)">
    <circle r="18" fill="url(#knob-grad)" stroke="#555" stroke-width="1.5"/>
    <line x1="0" y1="-7" x2="0" y2="-14" stroke="#c8c8c8" stroke-width="2" stroke-linecap="round"/>
    <circle r="3" fill="#bbb"/>
    <text y="28" font-family="Arial, sans-serif" font-size="8" fill="#777" text-anchor="middle">DEPTH</text>
  </g>

  <!-- Divider -->
  <line x1="500" y1="50" x2="500" y2="188" stroke="#333" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Section: Master / Presence -->
  <text x="555" y="62" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#888" letter-spacing="1" text-anchor="middle">MASTER</text>
  <line x1="504" y1="66" x2="614" y2="66" stroke="#444" stroke-width="0.5"/>

  <!-- Master Volume -->
  <g id="ctrl-master-volume" transform="translate(526,110)">
    <circle r="20" fill="url(#knob-grad)" stroke="#888" stroke-width="2"/>
    <circle r="13" fill="none" stroke="#333" stroke-width="1"/>
    <line x1="0" y1="-8" x2="0" y2="-16" stroke="#e0e0e0" stroke-width="2.5" stroke-linecap="round"/>
    <circle r="4" fill="#d0d0d0"/>
    <text y="32" font-family="Arial, sans-serif" font-size="8" fill="#999" text-anchor="middle" font-weight="700">MASTER</text>
  </g>

  <!-- Presence -->
  <g id="ctrl-presence" transform="translate(584,110)">
    <circle r="18" fill="url(#knob-grad)" stroke="#555" stroke-width="1.5"/>
    <line x1="0" y1="-7" x2="0" y2="-14" stroke="#c8c8c8" stroke-width="2" stroke-linecap="round"/>
    <circle r="3" fill="#bbb"/>
    <text y="28" font-family="Arial, sans-serif" font-size="8" fill="#777" text-anchor="middle">PRESENCE</text>
  </g>

  <!-- Divider -->
  <line x1="620" y1="50" x2="620" y2="188" stroke="#333" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Section: Power switches -->
  <!-- Standby switch -->
  <g id="ctrl-standby" transform="translate(650,100)">
    <rect x="-14" y="-22" width="28" height="44" rx="4" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
    <rect x="-8" y="-18" width="16" height="20" rx="2" fill="#e8e8e8" stroke="#ccc" stroke-width="0.5"/>
    <text y="32" font-family="Arial, sans-serif" font-size="7.5" fill="#777" text-anchor="middle">STANDBY</text>
  </g>

  <!-- Power switch -->
  <g id="ctrl-power" transform="translate(700,100)">
    <rect x="-14" y="-22" width="28" height="44" rx="4" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
    <rect x="-8" y="-18" width="16" height="20" rx="2" fill="#e83030" stroke="#cc2020" stroke-width="0.5"/>
    <text y="32" font-family="Arial, sans-serif" font-size="7.5" fill="#777" text-anchor="middle">POWER</text>
  </g>

  <!-- Power indicator lamp -->
  <g id="ctrl-power-lamp" transform="translate(740,100)">
    <circle r="8" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
    <circle r="5" fill="#ff4444" opacity="0.9"/>
    <circle r="2.5" fill="#ffaaaa"/>
  </g>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- INPUT JACKS (bottom of control panel) -->
  <!-- ══════════════════════════════════════════════════════ -->
  <g id="input-normal" transform="translate(62,168)">
    <circle r="8" fill="#1a1a1a" stroke="url(#chrome-grad)" stroke-width="2"/>
    <circle r="3" fill="#2a2a2a"/>
    <text y="18" font-family="Arial, sans-serif" font-size="6.5" fill="#666" text-anchor="middle">NORMAL</text>
  </g>
  <g id="input-tb" transform="translate(90,168)">
    <circle r="8" fill="#1a1a1a" stroke="url(#chrome-grad)" stroke-width="2"/>
    <circle r="3" fill="#2a2a2a"/>
    <text y="18" font-family="Arial, sans-serif" font-size="6.5" fill="#666" text-anchor="middle">T.BOOST</text>
  </g>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- SPEAKER GRILL -->
  <!-- ══════════════════════════════════════════════════════ -->
  <rect x="38" y="196" width="724" height="456" rx="4" fill="url(#diamond-grill)" stroke="#8a7a3a" stroke-width="1.5"/>

  <!-- Grill border / bezel -->
  <rect x="38" y="196" width="724" height="456" rx="4" fill="none" stroke="#5a4e2a" stroke-width="3"/>

  <!-- Speaker shadows (2x12 layout) -->
  <!-- Speaker Left -->
  <g transform="translate(200,424)">
    <circle r="170" fill="none" stroke="#6a5a2a" stroke-width="3" opacity="0.5"/>
    <circle r="155" fill="none" stroke="#5a4a1a" stroke-width="2" opacity="0.4"/>
    <circle r="50" fill="#8a7a3a" opacity="0.3"/>
    <circle r="30" fill="#6a5a2a" opacity="0.4"/>
    <circle r="12" fill="#4a3a1a" opacity="0.5"/>
  </g>

  <!-- Speaker Right -->
  <g transform="translate(600,424)">
    <circle r="170" fill="none" stroke="#6a5a2a" stroke-width="3" opacity="0.5"/>
    <circle r="155" fill="none" stroke="#5a4a1a" stroke-width="2" opacity="0.4"/>
    <circle r="50" fill="#8a7a3a" opacity="0.3"/>
    <circle r="30" fill="#6a5a2a" opacity="0.4"/>
    <circle r="12" fill="#4a3a1a" opacity="0.5"/>
  </g>

  <!-- Logo VOX removido — será inserido programaticamente -->
  <!-- id="vox-logo-anchor" pode ser usado para posicionamento: cx=400, cy=248 -->

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- BOTTOM STRIP (feet area) -->
  <!-- ══════════════════════════════════════════════════════ -->
  <!-- Rubber feet -->
  <ellipse cx="80" cy="672" rx="20" ry="6" fill="#111" stroke="#333" stroke-width="1"/>
  <ellipse cx="720" cy="672" rx="20" ry="6" fill="#111" stroke="#333" stroke-width="1"/>
  <ellipse cx="240" cy="672" rx="14" ry="5" fill="#111" stroke="#333" stroke-width="1"/>
  <ellipse cx="560" cy="672" rx="14" ry="5" fill="#111" stroke="#333" stroke-width="1"/>

  <!-- Subtle vignette overlay -->
  <rect x="20" y="20" width="760" height="660" rx="18" fill="none" stroke="#ffffff08" stroke-width="1"/>
</svg>
