<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#262626"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>

  <!-- Painel -->
  <rect x="0" y="0" width="800" height="200" rx="4" fill="url(#panel)"/>
  <rect x="0" y="0" width="800" height="4" fill="#b0b0b0" opacity="0.3"/>
  <rect x="0" y="196" width="800" height="4" fill="#b0b0b0" opacity="0.2"/>

  <!-- NORMAL -->
  <text x="60" y="20" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="#707070" letter-spacing="1.5" text-anchor="middle">NORMAL</text>
  <line x1="14" y1="24" x2="108" y2="24" stroke="#3a3a3a" stroke-width="0.5"/>

  <circle id="ctrl-normal-volume" cx="44"  cy="90" r="22" fill="#111" stroke="#505050" stroke-width="1.5"/>
  <circle id="ctrl-normal-bass"   cx="96"  cy="80" r="16" fill="#111" stroke="#505050" stroke-width="1.5"/>
  <circle id="ctrl-normal-treble" cx="140" cy="80" r="16" fill="#111" stroke="#505050" stroke-width="1.5"/>

  <text x="44"  y="128" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">VOL</text>
  <text x="96"  y="112" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">BASS</text>
  <text x="140" y="112" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">TREBLE</text>

  <line x1="172" y1="8" x2="172" y2="192" stroke="#303030" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- TOP BOOST -->
  <text x="308" y="20" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="#c89010" letter-spacing="1.5" text-anchor="middle">TOP BOOST</text>
  <line x1="176" y1="24" x2="442" y2="24" stroke="#c89010" stroke-width="0.5" opacity="0.5"/>

  <circle id="ctrl-tb-volume" cx="214" cy="90" r="22" fill="#111" stroke="#505050" stroke-width="1.5"/>
  <circle id="ctrl-tb-bass"   cx="272" cy="90" r="22" fill="#111" stroke="#505050" stroke-width="1.5"/>
  <circle id="ctrl-tb-treble" cx="330" cy="90" r="22" fill="#111" stroke="#505050" stroke-width="1.5"/>
  <circle id="ctrl-tb-cut"    cx="388" cy="90" r="22" fill="#111" stroke="#505050" stroke-width="1.5"/>

  <text x="214" y="128" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">VOL</text>
  <text x="272" y="128" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">BASS</text>
  <text x="330" y="128" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">TREBLE</text>
  <text x="388" y="128" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">CUT</text>

  <line x1="446" y1="8" x2="446" y2="192" stroke="#303030" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- VIBRATO -->
  <text x="508" y="20" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="#707070" letter-spacing="1.5" text-anchor="middle">VIBRATO</text>
  <line x1="450" y1="24" x2="568" y2="24" stroke="#3a3a3a" stroke-width="0.5"/>

  <circle id="ctrl-vibrato-speed" cx="476" cy="90" r="22" fill="#111" stroke="#505050" stroke-width="1.5"/>
  <circle id="ctrl-vibrato-depth" cx="538" cy="90" r="22" fill="#111" stroke="#505050" stroke-width="1.5"/>

  <text x="476" y="128" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">SPEED</text>
  <text x="538" y="128" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">DEPTH</text>

  <line x1="572" y1="8" x2="572" y2="192" stroke="#303030" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- MASTER -->
  <text x="630" y="20" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="#707070" letter-spacing="1.5" text-anchor="middle">MASTER</text>
  <line x1="576" y1="24" x2="686" y2="24" stroke="#3a3a3a" stroke-width="0.5"/>

  <circle id="ctrl-master-volume" cx="602" cy="90" r="22" fill="#111" stroke="#505050" stroke-width="1.5"/>
  <circle id="ctrl-presence"      cx="660" cy="90" r="22" fill="#111" stroke="#505050" stroke-width="1.5"/>

  <text x="602" y="128" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">MASTER</text>
  <text x="660" y="128" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">PRESENCE</text>

  <line x1="690" y1="8" x2="690" y2="192" stroke="#303030" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- POWER -->
  <g id="ctrl-standby" transform="translate(718,90)">
    <rect x="-13" y="-22" width="26" height="44" rx="3" fill="#0e0e0e" stroke="#404040" stroke-width="1"/>
    <rect x="-8"  y="-18" width="16" height="20" rx="2" fill="#d0d0d0" stroke="#aaa" stroke-width="0.5"/>
    <text y="38" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">STANDBY</text>
  </g>

  <g id="ctrl-power" transform="translate(760,90)">
    <rect x="-13" y="-22" width="26" height="44" rx="3" fill="#0e0e0e" stroke="#404040" stroke-width="1"/>
    <rect x="-8"  y="-18" width="16" height="20" rx="2" fill="#c02020" stroke="#901010" stroke-width="0.5"/>
    <text y="38" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">POWER</text>
  </g>

  <circle id="ctrl-power-lamp" cx="790" cy="155" r="7" fill="#111" stroke="#333" stroke-width="1"/>
  <circle cx="790" cy="155" r="4" fill="#ff3030" opacity="0.7"/>
</svg>
