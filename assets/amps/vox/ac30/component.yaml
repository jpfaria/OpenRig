id: vox_ac30_top_boost
name: Vox AC30 Top Boost
brand: Vox
model: AC30 Top Boost
category: amp
icon_kind: amp
year: 1964
description: >
  O Vox AC30 Top Boost é um dos amplificadores mais icônicos da história do rock.
  Alimentado por 4 válvulas EL84 em push-pull, produz 30W. Famoso por The Beatles,
  The Edge (U2), Brian May (Queen), Tom Petty e inúmeros outros artistas.

