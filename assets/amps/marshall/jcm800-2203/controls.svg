<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#262626"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>

  <!-- Painel -->
  <rect x="0" y="0" width="800" height="200" rx="4" fill="url(#panel)"/>
  <rect x="0" y="0" width="800" height="4" fill="#b0b0b0" opacity="0.3"/>
  <rect x="0" y="196" width="800" height="4" fill="#b0b0b0" opacity="0.2"/>

  <!-- Model label -->
  <text x="56" y="18" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="#707070" letter-spacing="1.5" text-anchor="middle">JCM 800</text>
  <text x="56" y="30" font-family="Arial,sans-serif" font-size="6" fill="#505050" letter-spacing="1" text-anchor="middle">MODEL 2203</text>
  <line x1="8" y1="34" x2="104" y2="34" stroke="#3a3a3a" stroke-width="0.5"/>

  <!-- INPUT section (visual only) -->
  <text x="56" y="52" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="#707070" letter-spacing="1.5" text-anchor="middle">INPUT</text>
  <line x1="8" y1="56" x2="104" y2="56" stroke="#3a3a3a" stroke-width="0.5"/>

  <circle cx="28" cy="100" r="12" fill="#0e0e0e" stroke="#404040" stroke-width="1.5"/>
  <circle cx="28" cy="100" r="5"  fill="#2a2a2a"/>
  <text x="28" y="124" font-family="Arial,sans-serif" font-size="7" fill="#444" text-anchor="middle">HIGH</text>

  <circle cx="72" cy="100" r="12" fill="#0e0e0e" stroke="#404040" stroke-width="1.5"/>
  <circle cx="72" cy="100" r="5"  fill="#2a2a2a"/>
  <text x="72" y="124" font-family="Arial,sans-serif" font-size="7" fill="#444" text-anchor="middle">LOW</text>

  <line x1="106" y1="8" x2="106" y2="192" stroke="#303030" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- VOLUME section -->
  <text x="453" y="20" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="#707070" letter-spacing="1.5" text-anchor="middle">VOLUME</text>
  <line x1="108" y1="24" x2="800" y2="24" stroke="#3a3a3a" stroke-width="0.5"/>

  <!-- MASTER VOLUME (param: volume) -->
  <circle id="ctrl-volume" cx="400" cy="100" r="30" fill="#111" stroke="#505050" stroke-width="1.5"/>
  <text x="400" y="148" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">MASTER</text>

  <!-- PRE-AMP VOLUME (param: gain) -->
  <circle id="ctrl-gain" cx="560" cy="100" r="30" fill="#111" stroke="#505050" stroke-width="1.5"/>
  <text x="560" y="148" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">PRE-AMP</text>
</svg>
