<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="panel-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#222222"/>
    </linearGradient>
    <linearGradient id="panel-bottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4a44a"/>
      <stop offset="40%" stop-color="#b8963e"/>
      <stop offset="100%" stop-color="#a08030"/>
    </linearGradient>
    <linearGradient id="knob-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4b86a"/>
      <stop offset="50%" stop-color="#c0a050"/>
      <stop offset="100%" stop-color="#a08838"/>
    </linearGradient>
  </defs>

  <!-- Top dark panel -->
  <rect x="0" y="0" width="800" height="60" fill="url(#panel-top)"/>
  <!-- Bottom gold panel -->
  <rect x="0" y="60" width="800" height="140" fill="url(#panel-bottom)"/>
  <!-- Gold trim line -->
  <rect x="0" y="58" width="800" height="4" fill="#d4b868" opacity="0.6"/>

  <!-- ═══ TOP LABELS ═══ -->
  <!-- JCM 800 branding -->
  <text x="60" y="22" font-family="Arial,sans-serif" font-size="14" font-weight="900" fill="#c8c8c8" letter-spacing="2" text-anchor="middle">JCM 800</text>
  <text x="60" y="36" font-family="Arial,sans-serif" font-size="7" fill="#888" letter-spacing="3" text-anchor="middle">LEAD SERIES</text>
  <text x="60" y="48" font-family="Arial,sans-serif" font-size="6" fill="#666" letter-spacing="2" text-anchor="middle">STUDIO</text>

  <!-- Vertical separator after branding -->
  <line x1="130" y1="6" x2="130" y2="54" stroke="#444" stroke-width="0.8" stroke-dasharray="2,2"/>

  <!-- Section labels in dark area -->
  <text x="220" y="22" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#aaa" letter-spacing="2" text-anchor="middle">PRESENCE</text>
  <text x="330" y="22" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#aaa" letter-spacing="2" text-anchor="middle">BASS</text>
  <text x="420" y="22" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#aaa" letter-spacing="2" text-anchor="middle">MIDDLE</text>
  <text x="510" y="22" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#aaa" letter-spacing="2" text-anchor="middle">TREBLE</text>
  <text x="620" y="22" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#aaa" letter-spacing="2" text-anchor="middle">MASTER</text>
  <text x="720" y="22" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#aaa" letter-spacing="2" text-anchor="middle">PRE-AMP</text>

  <!-- Sub-labels -->
  <text x="620" y="36" font-family="Arial,sans-serif" font-size="7" fill="#777" letter-spacing="1" text-anchor="middle">VOLUME</text>
  <text x="720" y="36" font-family="Arial,sans-serif" font-size="7" fill="#777" letter-spacing="1" text-anchor="middle">VOLUME</text>

  <!-- ═══ KNOBS ON GOLD PANEL ═══ -->

  <!-- PRESENCE (visual only, not editable for NAM) -->
  <circle cx="220" cy="120" r="26" fill="url(#knob-fill)" stroke="#8a7030" stroke-width="1.5" opacity="0.5"/>
  <circle cx="220" cy="120" r="4" fill="#5a4a20" opacity="0.5"/>
  <text x="220" y="165" font-family="Arial,sans-serif" font-size="8" fill="#5a4a20" text-anchor="middle" opacity="0.5">0 — 10</text>

  <!-- BASS (visual only) -->
  <circle cx="330" cy="120" r="26" fill="url(#knob-fill)" stroke="#8a7030" stroke-width="1.5" opacity="0.5"/>
  <circle cx="330" cy="120" r="4" fill="#5a4a20" opacity="0.5"/>
  <text x="330" y="165" font-family="Arial,sans-serif" font-size="8" fill="#5a4a20" text-anchor="middle" opacity="0.5">0 — 10</text>

  <!-- MIDDLE (visual only) -->
  <circle cx="420" cy="120" r="26" fill="url(#knob-fill)" stroke="#8a7030" stroke-width="1.5" opacity="0.5"/>
  <circle cx="420" cy="120" r="4" fill="#5a4a20" opacity="0.5"/>
  <text x="420" y="165" font-family="Arial,sans-serif" font-size="8" fill="#5a4a20" text-anchor="middle" opacity="0.5">0 — 10</text>

  <!-- TREBLE (visual only) -->
  <circle cx="510" cy="120" r="26" fill="url(#knob-fill)" stroke="#8a7030" stroke-width="1.5" opacity="0.5"/>
  <circle cx="510" cy="120" r="4" fill="#5a4a20" opacity="0.5"/>
  <text x="510" y="165" font-family="Arial,sans-serif" font-size="8" fill="#5a4a20" text-anchor="middle" opacity="0.5">0 — 10</text>

  <!-- MASTER VOLUME (editable — param: volume) -->
  <circle id="ctrl-volume" cx="620" cy="120" r="30" fill="url(#knob-fill)" stroke="#8a7030" stroke-width="2"/>
  <circle cx="620" cy="120" r="4" fill="#5a4a20"/>

  <!-- PRE-AMP VOLUME (editable — param: gain) -->
  <circle id="ctrl-gain" cx="720" cy="120" r="30" fill="url(#knob-fill)" stroke="#8a7030" stroke-width="2"/>
  <circle cx="720" cy="120" r="4" fill="#5a4a20"/>
</svg>
