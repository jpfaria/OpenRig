<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="panel-dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#252525"/>
    </linearGradient>
    <linearGradient id="panel-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4a44a"/>
      <stop offset="30%" stop-color="#b89840"/>
      <stop offset="100%" stop-color="#9a7e30"/>
    </linearGradient>
  </defs>

  <!-- Dark top -->
  <rect x="0" y="0" width="800" height="55" fill="url(#panel-dark)"/>
  <!-- Gold bottom -->
  <rect x="0" y="55" width="800" height="145" fill="url(#panel-gold)"/>
  <rect x="0" y="53" width="800" height="3" fill="#d4b868" opacity="0.4"/>

  <!-- ═══ JCM 800 branding (top dark area) ═══ -->
  <text x="170" y="28" font-family="Georgia,serif" font-size="18" font-weight="900" fill="#ccc" letter-spacing="3" text-anchor="middle">JCM 800</text>
  <text x="170" y="42" font-family="Arial,sans-serif" font-size="7" fill="#888" letter-spacing="2.5" text-anchor="middle">LEAD SERIES</text>
  <text x="170" y="51" font-family="Arial,sans-serif" font-size="6" fill="#666" letter-spacing="2" font-style="italic" text-anchor="middle">STUDIO</text>

  <line x1="240" y1="6" x2="240" y2="48" stroke="#444" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- ═══ Control labels (top dark area) ═══ -->
  <text x="310" y="20" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="#aaa" letter-spacing="2" text-anchor="middle">PRESENCE</text>
  <text x="400" y="20" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="#aaa" letter-spacing="2" text-anchor="middle">BASS</text>
  <text x="480" y="20" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="#aaa" letter-spacing="2" text-anchor="middle">MIDDLE</text>
  <text x="560" y="20" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="#aaa" letter-spacing="2" text-anchor="middle">TREBLE</text>
  <text x="650" y="16" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="#aaa" letter-spacing="2" text-anchor="middle">MASTER</text>
  <text x="650" y="28" font-family="Arial,sans-serif" font-size="6" fill="#777" letter-spacing="1" text-anchor="middle">VOLUME</text>
  <text x="730" y="16" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="#aaa" letter-spacing="2" text-anchor="middle">PRE-AMP</text>
  <text x="730" y="28" font-family="Arial,sans-serif" font-size="6" fill="#777" letter-spacing="1" text-anchor="middle">VOLUME</text>
  <line x1="250" y1="38" x2="770" y2="38" stroke="#444" stroke-width="0.4"/>

  <!-- ═══ Simple anchor circles for NON-editable knobs (visual only) ═══ -->
  <circle cx="310" cy="110" r="24" fill="#111" stroke="#505050" stroke-width="1.5" opacity="0.4"/>
  <circle cx="400" cy="110" r="24" fill="#111" stroke="#505050" stroke-width="1.5" opacity="0.4"/>
  <circle cx="480" cy="110" r="24" fill="#111" stroke="#505050" stroke-width="1.5" opacity="0.4"/>
  <circle cx="560" cy="110" r="24" fill="#111" stroke="#505050" stroke-width="1.5" opacity="0.4"/>

  <!-- Editable knob anchors (PanelKnob Slint overlay goes on top) -->
  <circle cx="650" cy="110" r="24" fill="#111" stroke="#606060" stroke-width="1.5"/>
  <circle cx="730" cy="110" r="24" fill="#111" stroke="#606060" stroke-width="1.5"/>

  <!-- ═══ Sensitivity jacks (right, visual) ═══ -->
  <text x="785" y="78" font-family="Arial,sans-serif" font-size="5" fill="#5a4a20" font-weight="700" text-anchor="middle">HIGH</text>
  <circle cx="785" cy="90" r="7" fill="#0e0e0e" stroke="#505050" stroke-width="0.8" opacity="0.5"/>
  <text x="785" y="112" font-family="Arial,sans-serif" font-size="5" fill="#5a4a20" font-weight="700" text-anchor="middle">SENSITIVITY</text>
  <circle cx="785" cy="125" r="7" fill="#0e0e0e" stroke="#505050" stroke-width="0.8" opacity="0.5"/>
  <text x="785" y="143" font-family="Arial,sans-serif" font-size="5" fill="#5a4a20" font-weight="700" text-anchor="middle">LOW</text>
</svg>
