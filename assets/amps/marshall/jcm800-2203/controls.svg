<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="panel-dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#252525"/>
    </linearGradient>
    <linearGradient id="panel-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4a44a"/>
      <stop offset="30%" stop-color="#b89840"/>
      <stop offset="100%" stop-color="#9a7e30"/>
    </linearGradient>

    <!-- Knob 3D: chrome ring gradient -->
    <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8d8d8"/>
      <stop offset="40%" stop-color="#707070"/>
      <stop offset="60%" stop-color="#505050"/>
      <stop offset="100%" stop-color="#b0b0b0"/>
    </linearGradient>

    <!-- Knob body: radial gradient lit from top-left -->
    <radialGradient id="knob-body" cx="42%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#404040"/>
      <stop offset="50%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>

    <!-- Center hub metallic -->
    <radialGradient id="hub" cx="40%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#b0b0b0"/>
      <stop offset="100%" stop-color="#505050"/>
    </radialGradient>

    <!-- Drop shadow -->
    <filter id="ks">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.45"/>
    </filter>

    <!-- Reusable knob (translate to position with <use>) -->
    <g id="knob">
      <circle r="24" fill="url(#knob-body)" filter="url(#ks)"/>
      <circle r="24" fill="none" stroke="url(#chrome)" stroke-width="2.5"/>
      <circle r="22" fill="none" stroke="#2a2a2a" stroke-width="0.5"/>
      <!-- Ridges (subtle radial lines for texture) -->
      <line y1="-19" y2="-14" stroke="#2a2a2a" stroke-width="0.7" transform="rotate(0)"/>
      <line y1="-19" y2="-14" stroke="#2a2a2a" stroke-width="0.7" transform="rotate(30)"/>
      <line y1="-19" y2="-14" stroke="#2a2a2a" stroke-width="0.7" transform="rotate(60)"/>
      <line y1="-19" y2="-14" stroke="#2a2a2a" stroke-width="0.7" transform="rotate(90)"/>
      <line y1="-19" y2="-14" stroke="#2a2a2a" stroke-width="0.7" transform="rotate(120)"/>
      <line y1="-19" y2="-14" stroke="#2a2a2a" stroke-width="0.7" transform="rotate(150)"/>
      <line y1="-19" y2="-14" stroke="#2a2a2a" stroke-width="0.7" transform="rotate(180)"/>
      <line y1="-19" y2="-14" stroke="#2a2a2a" stroke-width="0.7" transform="rotate(210)"/>
      <line y1="-19" y2="-14" stroke="#2a2a2a" stroke-width="0.7" transform="rotate(240)"/>
      <line y1="-19" y2="-14" stroke="#2a2a2a" stroke-width="0.7" transform="rotate(270)"/>
      <line y1="-19" y2="-14" stroke="#2a2a2a" stroke-width="0.7" transform="rotate(300)"/>
      <line y1="-19" y2="-14" stroke="#2a2a2a" stroke-width="0.7" transform="rotate(330)"/>
      <!-- Center hub -->
      <circle r="4.5" fill="url(#hub)"/>
      <circle r="4.5" fill="none" stroke="#666" stroke-width="0.5"/>
    </g>

    <!-- Scale dots (3 dots: min, mid, max around bottom arc) -->
    <g id="dots">
      <circle cx="-19" cy="19" r="1.5" fill="#5a4a20"/>
      <circle cx="0" cy="27" r="1.5" fill="#5a4a20"/>
      <circle cx="19" cy="19" r="1.5" fill="#5a4a20"/>
    </g>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="55" fill="url(#panel-dark)"/>
  <rect x="0" y="55" width="800" height="145" fill="url(#panel-gold)"/>
  <rect x="0" y="53" width="800" height="3" fill="#d4b868" opacity="0.4"/>

  <!-- ═══ LEFT: Power section ═══ -->
  <text x="48" y="192" font-family="Arial,sans-serif" font-size="7" fill="#5a4a20" font-weight="700" text-anchor="middle">POWER</text>
  <rect x="80" y="88" width="18" height="36" rx="3" fill="#0e0e0e" stroke="#505050" stroke-width="0.8" opacity="0.5"/>
  <text x="89" y="82" font-family="Arial,sans-serif" font-size="5" fill="#5a4a20" text-anchor="middle" opacity="0.5">LOW</text>
  <text x="89" y="138" font-family="Arial,sans-serif" font-size="5" fill="#5a4a20" text-anchor="middle" opacity="0.5">HIGH</text>

  <!-- ═══ JCM 800 branding ═══ -->
  <text x="170" y="28" font-family="Georgia,serif" font-size="18" font-weight="900" fill="#ccc" letter-spacing="3" text-anchor="middle">JCM 800</text>
  <text x="170" y="42" font-family="Arial,sans-serif" font-size="7" fill="#888" letter-spacing="2.5" text-anchor="middle">LEAD SERIES</text>
  <text x="170" y="51" font-family="Arial,sans-serif" font-size="6" fill="#666" letter-spacing="2" font-style="italic" text-anchor="middle">STUDIO</text>

  <line x1="240" y1="6" x2="240" y2="48" stroke="#444" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- ═══ LABELS ═══ -->
  <text x="310" y="20" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="#aaa" letter-spacing="2" text-anchor="middle">PRESENCE</text>
  <text x="400" y="20" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="#aaa" letter-spacing="2" text-anchor="middle">BASS</text>
  <text x="480" y="20" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="#aaa" letter-spacing="2" text-anchor="middle">MIDDLE</text>
  <text x="560" y="20" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="#aaa" letter-spacing="2" text-anchor="middle">TREBLE</text>
  <text x="650" y="16" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="#aaa" letter-spacing="2" text-anchor="middle">MASTER</text>
  <text x="650" y="28" font-family="Arial,sans-serif" font-size="6" fill="#777" letter-spacing="1" text-anchor="middle">VOLUME</text>
  <text x="730" y="16" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="#aaa" letter-spacing="2" text-anchor="middle">PRE-AMP</text>
  <text x="730" y="28" font-family="Arial,sans-serif" font-size="6" fill="#777" letter-spacing="1" text-anchor="middle">VOLUME</text>
  <line x1="250" y1="38" x2="770" y2="38" stroke="#444" stroke-width="0.4"/>

  <!-- ═══ KNOBS ═══ -->

  <!-- PRESENCE (visual, opacity 0.5) -->
  <g transform="translate(310,110)" opacity="0.5">
    <use href="#knob"/>
    <use href="#dots"/>
  </g>

  <!-- BASS (visual) -->
  <g transform="translate(400,110)" opacity="0.5">
    <use href="#knob"/>
    <use href="#dots"/>
  </g>

  <!-- MIDDLE (visual) -->
  <g transform="translate(480,110)" opacity="0.5">
    <use href="#knob"/>
    <use href="#dots"/>
  </g>

  <!-- TREBLE (visual) -->
  <g transform="translate(560,110)" opacity="0.5">
    <use href="#knob"/>
    <use href="#dots"/>
  </g>

  <!-- MASTER VOLUME (editable) -->
  <g transform="translate(650,110)">
    <use href="#knob" id="ctrl-volume"/>
    <use href="#dots"/>
  </g>

  <!-- PRE-AMP VOLUME (editable) -->
  <g transform="translate(730,110)">
    <use href="#knob" id="ctrl-gain"/>
    <use href="#dots"/>
  </g>

  <!-- ═══ RIGHT: Sensitivity ═══ -->
  <text x="785" y="78" font-family="Arial,sans-serif" font-size="5" fill="#5a4a20" font-weight="700" text-anchor="middle">HIGH</text>
  <circle cx="785" cy="90" r="7" fill="#0e0e0e" stroke="#505050" stroke-width="0.8" opacity="0.5"/>
  <text x="785" y="112" font-family="Arial,sans-serif" font-size="5" fill="#5a4a20" font-weight="700" letter-spacing="0.3" text-anchor="middle">SENSITIVITY</text>
  <circle cx="785" cy="125" r="7" fill="#0e0e0e" stroke="#505050" stroke-width="0.8" opacity="0.5"/>
  <text x="785" y="143" font-family="Arial,sans-serif" font-size="5" fill="#5a4a20" font-weight="700" text-anchor="middle">LOW</text>
</svg>
