<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="panel-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1c1c"/>
      <stop offset="100%" stop-color="#252525"/>
    </linearGradient>
    <linearGradient id="panel-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4a44a"/>
      <stop offset="30%" stop-color="#b89840"/>
      <stop offset="100%" stop-color="#9a7e30"/>
    </linearGradient>
    <radialGradient id="knob-bg" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#d8c070"/>
      <stop offset="70%" stop-color="#c0a450"/>
      <stop offset="100%" stop-color="#a08838"/>
    </radialGradient>
  </defs>

  <!-- Top dark panel (labels area) -->
  <rect x="0" y="0" width="800" height="50" fill="url(#panel-top)"/>
  <!-- Gold trim at transition -->
  <rect x="0" y="48" width="800" height="3" fill="#c8a848" opacity="0.5"/>
  <!-- Bottom gold panel (knobs area) -->
  <rect x="0" y="50" width="800" height="150" fill="url(#panel-gold)"/>
  <!-- Bottom edge shadow -->
  <rect x="0" y="195" width="800" height="5" fill="#6a5820" opacity="0.5"/>

  <!-- ═══ TOP: Section labels ═══ -->
  <text x="140" y="20" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#999" letter-spacing="2" text-anchor="middle">PRESENCE</text>
  <text x="260" y="20" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#999" letter-spacing="2" text-anchor="middle">BASS</text>
  <text x="380" y="20" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#999" letter-spacing="2" text-anchor="middle">MIDDLE</text>
  <text x="500" y="20" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#999" letter-spacing="2" text-anchor="middle">TREBLE</text>
  <text x="620" y="16" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#999" letter-spacing="2" text-anchor="middle">MASTER</text>
  <text x="620" y="30" font-family="Arial,sans-serif" font-size="7" fill="#666" letter-spacing="1" text-anchor="middle">VOLUME</text>
  <text x="720" y="16" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#999" letter-spacing="2" text-anchor="middle">PRE-AMP</text>
  <text x="720" y="30" font-family="Arial,sans-serif" font-size="7" fill="#666" letter-spacing="1" text-anchor="middle">VOLUME</text>

  <!-- Thin line under labels -->
  <line x1="80" y1="40" x2="780" y2="40" stroke="#444" stroke-width="0.5"/>

  <!-- ═══ KNOBS (all same size r=26, on gold panel) ═══ -->

  <!-- PRESENCE (visual only, opacity 0.6) -->
  <circle cx="140" cy="120" r="26" fill="#111" stroke="#505050" stroke-width="1.5" opacity="0.6"/>
  <circle cx="140" cy="120" r="3" fill="#333" opacity="0.6"/>

  <!-- BASS (visual only) -->
  <circle cx="260" cy="120" r="26" fill="#111" stroke="#505050" stroke-width="1.5" opacity="0.6"/>
  <circle cx="260" cy="120" r="3" fill="#333" opacity="0.6"/>

  <!-- MIDDLE (visual only) -->
  <circle cx="380" cy="120" r="26" fill="#111" stroke="#505050" stroke-width="1.5" opacity="0.6"/>
  <circle cx="380" cy="120" r="3" fill="#333" opacity="0.6"/>

  <!-- TREBLE (visual only) -->
  <circle cx="500" cy="120" r="26" fill="#111" stroke="#505050" stroke-width="1.5" opacity="0.6"/>
  <circle cx="500" cy="120" r="3" fill="#333" opacity="0.6"/>

  <!-- MASTER VOLUME (editable — param: volume) -->
  <circle id="ctrl-volume" cx="620" cy="120" r="26" fill="#111" stroke="#505050" stroke-width="1.5"/>
  <circle cx="620" cy="120" r="3" fill="#444"/>

  <!-- PRE-AMP VOLUME (editable — param: gain) -->
  <circle id="ctrl-gain" cx="720" cy="120" r="26" fill="#111" stroke="#505050" stroke-width="1.5"/>
  <circle cx="720" cy="120" r="3" fill="#444"/>
</svg>
