<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="500" height="200">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#262626"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>

  <!-- Painel genérico -->
  <rect x="0" y="0" width="500" height="200" rx="4" fill="url(#panel)"/>
  <rect x="0" y="0" width="500" height="4" fill="#b0b0b0" opacity="0.3"/>
  <rect x="0" y="196" width="500" height="4" fill="#b0b0b0" opacity="0.2"/>

  <!-- GAIN -->
  <text x="80" y="20" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="#707070" letter-spacing="1.5" text-anchor="middle">GAIN</text>
  <line x1="14" y1="24" x2="148" y2="24" stroke="#3a3a3a" stroke-width="0.5"/>

  <circle id="ctrl-gain"   cx="48"  cy="90" r="22" fill="#111" stroke="#505050" stroke-width="1.5"/>
  <circle id="ctrl-volume" cx="112" cy="90" r="22" fill="#111" stroke="#505050" stroke-width="1.5"/>

  <text x="48"  y="128" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">GAIN</text>
  <text x="112" y="128" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">VOL</text>

  <line x1="158" y1="8" x2="158" y2="192" stroke="#303030" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- EQ -->
  <text x="256" y="20" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="#707070" letter-spacing="1.5" text-anchor="middle">EQ</text>
  <line x1="162" y1="24" x2="352" y2="24" stroke="#3a3a3a" stroke-width="0.5"/>

  <circle id="ctrl-bass"     cx="192" cy="90" r="22" fill="#111" stroke="#505050" stroke-width="1.5"/>
  <circle id="ctrl-mid"      cx="256" cy="90" r="22" fill="#111" stroke="#505050" stroke-width="1.5"/>
  <circle id="ctrl-treble"   cx="320" cy="90" r="22" fill="#111" stroke="#505050" stroke-width="1.5"/>

  <text x="192" y="128" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">BASS</text>
  <text x="256" y="128" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">MID</text>
  <text x="320" y="128" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">TREBLE</text>

  <line x1="358" y1="8" x2="358" y2="192" stroke="#303030" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- MASTER -->
  <text x="420" y="20" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="#707070" letter-spacing="1.5" text-anchor="middle">MASTER</text>
  <line x1="362" y1="24" x2="486" y2="24" stroke="#3a3a3a" stroke-width="0.5"/>

  <circle id="ctrl-master"   cx="392" cy="90" r="22" fill="#111" stroke="#505050" stroke-width="1.5"/>
  <circle id="ctrl-presence" cx="456" cy="90" r="22" fill="#111" stroke="#505050" stroke-width="1.5"/>

  <text x="392" y="128" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">MASTER</text>
  <text x="456" y="128" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">PRESENCE</text>
</svg>
