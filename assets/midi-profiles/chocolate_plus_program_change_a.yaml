# M-Vave Chocolate Plus — CubeSuite "Program change A" mode (factory)
#
# Default layout when the CubeSuite app is set to "Program change A":
# - 4 footswitches A/B/C/D + E/F = bank up/down
# - Up to 32 banks × 4 switches = 128 distinct Program Change values
# - Channel 1
# - Bank N: A = PC 4(n-1), B = 4(n-1)+1, C = 4(n-1)+2, D = 4(n-1)+3
#
# OpenRig binds the first 4 banks (PCs 0-15) to live-performance actions.
# Banks 5-32 (PCs 16-127) are left unbound — clone this profile via
# [Customize] in Settings/MIDI to add your own bindings without touching
# the factory file.
#
# See `chocolate_plus_program_change_a.md` for the bank/switch table.

name: "Chocolate Plus — Program Change A (factory)"
source: "FootCtrlPlus"
description: |
  M-Vave Chocolate Plus in CubeSuite "Program change A" mode.
  Banks 1-4 bound (PCs 0-15) to preset/scene nav, chain nav, block nav,
  and toggles. Banks 5+ unbound — clone and edit to add jumps or your
  own actions.

bindings:
  # Bank 1 — preset / scene navigation (live)
  - when: { kind: ProgramChange, channel: 1, program: 0 }
    do: prev_preset
  - when: { kind: ProgramChange, channel: 1, program: 1 }
    do: next_preset
  - when: { kind: ProgramChange, channel: 1, program: 2 }
    do: prev_scene
  - when: { kind: ProgramChange, channel: 1, program: 3 }
    do: next_scene

  # Bank 2 — chain navigation + chain controls
  - when: { kind: ProgramChange, channel: 1, program: 4 }
    do: prev_chain
  - when: { kind: ProgramChange, channel: 1, program: 5 }
    do: next_chain
  - when: { kind: ProgramChange, channel: 1, program: 6 }
    do: toggle_active_chain_enabled
  - when: { kind: ProgramChange, channel: 1, program: 7 }
    do: toggle_compact_view

  # Bank 3 — block navigation (1-step and 2-step for compact view)
  - when: { kind: ProgramChange, channel: 1, program: 8 }
    do: prev_block_1
  - when: { kind: ProgramChange, channel: 1, program: 9 }
    do: next_block_1
  - when: { kind: ProgramChange, channel: 1, program: 10 }
    do: prev_block_2
  - when: { kind: ProgramChange, channel: 1, program: 11 }
    do: next_block_2

  # Bank 4 — block toggle + global toggles
  - when: { kind: ProgramChange, channel: 1, program: 12 }
    do: toggle_active_block_enabled
  - when: { kind: ProgramChange, channel: 1, program: 13 }
    do: toggle_tuner
  - when: { kind: ProgramChange, channel: 1, program: 14 }
    do: toggle_output_mute
  - when: { kind: ProgramChange, channel: 1, program: 15 }
    do: toggle_spectrum
