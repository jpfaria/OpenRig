[workspace]
members = [
  "crates/pedal-domain",
  "crates/pedal-application",
  "crates/pedal-engine",
  "crates/pedal-ports",
  "crates/pedal-setup",
  "crates/pedal-preset",
  "crates/pedal-state",
  "crates/pedal-nam",
  "crates/pedal-ir",
  "crates/pedal-infra-yaml",
  "crates/pedal-infra-filesystem",
  "crates/pedal-infra-cpal",
  "crates/pedal-adapter-console",
  "crates/pedal-adapter-grpc",
  "crates/pedal-adapter-gui",
  "crates/pedal-adapter-vst3",
]
resolver = "2"

[workspace.package]
edition = "2021"
version = "0.1.0"
authors = ["João Paulo"]

[workspace.dependencies]
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
thiserror = "1"
cpal = "0.15"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
tonic = "0.12"
prost = "0.13"
uuid = { version = "1", features = ["v4", "serde"] }
