[workspace]
members = [
  "crates/domain",
  "crates/application",
  "crates/engine",
  "crates/ports",
  "crates/setup",
  "crates/preset",
  "crates/state",
  "crates/stage-core",
  "crates/stage-gain",
  "crates/stage-dyn-compressor",
  "crates/stage-dyn-gate",
  "crates/stage-filter-eq",
  "crates/stage-mod-tremolo",
  "crates/stage-delay-digital",
  "crates/stage-reverb-plate",
  "crates/stage-pitch",
  "crates/stage-util-tuner",
  "crates/stage-routing",
  "crates/nam",
  "crates/stage-nam",
  "crates/stage-amp",
  "crates/stage-cab",
  "crates/infra-yaml",
  "crates/infra-filesystem",
  "crates/infra-cpal",
  "crates/adapter-console",
  "crates/adapter-server",
  "crates/adapter-gui",
  "crates/adapter-vst3",
]
resolver = "2"

[workspace.package]
edition = "2021"
version = "0.1.0"
authors = ["João Paulo"]

[workspace.dependencies]
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
thiserror = "1"
cpal = "0.15"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
tonic = "0.12"
prost = "0.13"
uuid = { version = "1", features = ["v4", "serde"] }
arc-swap = "1.7"
