# Quality gate config (github.com/xgodev/quality-gate).
#
# The shared gate ships as a per-language Docker image that carries the Rust
# toolchain but NOT OpenRig's native build dependencies. OpenRig links ALSA,
# JACK, fontconfig, libseat, libinput, gbm and xkbcommon (audio + winit/Slint
# backends, plus the *-sys FFI crates). Declare them here so the gate installs
# them once, inside the container, before it builds either side of the
# comparison — keeping the shared image lean and generic while OpenRig owns its
# deps. Installed via apt-get; a failed install is a tool error (exit 2), never
# a code verdict.
system_packages:
  - libasound2-dev
  - libudev-dev
  - pkg-config
  - libfontconfig1-dev
  - libseat-dev
  - libxkbcommon-dev
  - libinput-dev
  - libgbm-dev
  - libjack-jackd2-dev
