<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Tweed breakup: vintage amp with warm breakup wave -->
  <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Amp head silhouette -->
    <rect x="10" y="24" width="60" height="38" rx="3" />
    <!-- Control panel line -->
    <line x1="10" y1="40" x2="70" y2="40" />
    <!-- Knobs on top panel -->
    <circle cx="24" cy="32" r="4" />
    <circle cx="40" cy="32" r="4" />
    <circle cx="56" cy="32" r="4" />
    <!-- Tweed diagonal weave pattern (lower half) -->
    <line x1="16" y1="44" x2="24" y2="56" stroke-width="1" opacity="0.4" />
    <line x1="26" y1="44" x2="34" y2="56" stroke-width="1" opacity="0.4" />
    <line x1="36" y1="44" x2="44" y2="56" stroke-width="1" opacity="0.4" />
    <line x1="46" y1="44" x2="54" y2="56" stroke-width="1" opacity="0.4" />
    <line x1="56" y1="44" x2="64" y2="56" stroke-width="1" opacity="0.4" />
    <!-- Breakup wave above (slightly clipped sine) -->
    <path d="M16,18 C19,12 22,12 24,16 C26,20 27,14 30,14 C33,14 35,20 38,16 C40,13 44,18 46,14" stroke-width="1.2" opacity="0.7" />
  </g>
</svg>
