<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Blackface clean: vintage amp silhouette with clean tone -->
  <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Amp head silhouette -->
    <rect x="10" y="22" width="60" height="40" rx="3" />
    <!-- Control panel line -->
    <line x1="10" y1="38" x2="70" y2="38" />
    <!-- Knobs on top panel -->
    <circle cx="22" cy="30" r="4" />
    <circle cx="34" cy="30" r="4" />
    <circle cx="46" cy="30" r="4" />
    <circle cx="58" cy="30" r="4" />
    <!-- Speaker grille lines (lower half) -->
    <line x1="18" y1="44" x2="18" y2="56" stroke-width="1" opacity="0.5" />
    <line x1="26" y1="44" x2="26" y2="56" stroke-width="1" opacity="0.5" />
    <line x1="34" y1="44" x2="34" y2="56" stroke-width="1" opacity="0.5" />
    <line x1="42" y1="44" x2="42" y2="56" stroke-width="1" opacity="0.5" />
    <line x1="50" y1="44" x2="50" y2="56" stroke-width="1" opacity="0.5" />
    <line x1="58" y1="44" x2="58" y2="56" stroke-width="1" opacity="0.5" />
    <line x1="66" y1="44" x2="66" y2="56" stroke-width="1" opacity="0.5" />
    <!-- Clean sine wave above amp -->
    <path d="M20,16 C23,10 27,10 30,16 C33,22 37,22 40,16" stroke-width="1" opacity="0.6" />
  </g>
</svg>
