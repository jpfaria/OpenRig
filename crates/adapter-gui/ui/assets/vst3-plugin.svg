<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
  <!-- Rack unit body -->
  <rect x="6" y="22" width="88" height="56" rx="6" stroke-width="4"/>
  <!-- Left jack socket -->
  <circle cx="20" cy="50" r="9" stroke-width="3.5"/>
  <circle cx="20" cy="50" r="3" fill="currentColor" stroke="none"/>
  <!-- Right jack socket -->
  <circle cx="80" cy="50" r="9" stroke-width="3.5"/>
  <circle cx="80" cy="50" r="3" fill="currentColor" stroke="none"/>
  <!-- Knob left -->
  <circle cx="40" cy="50" r="7" stroke-width="3"/>
  <line x1="40" y1="43" x2="40" y2="47" stroke-width="2.5"/>
  <!-- Knob center -->
  <circle cx="60" cy="50" r="7" stroke-width="3"/>
  <line x1="60" y1="43" x2="60" y2="47" stroke-width="2.5"/>
  <!-- Mounting screws -->
  <circle cx="14" cy="28" r="2.5" fill="currentColor" stroke="none"/>
  <circle cx="86" cy="28" r="2.5" fill="currentColor" stroke="none"/>
  <circle cx="14" cy="72" r="2.5" fill="currentColor" stroke="none"/>
  <circle cx="86" cy="72" r="2.5" fill="currentColor" stroke="none"/>
</svg>
