# Format: rust-i18n v3 YAML.
# Keys are the source-language strings themselves so:
#   - The codebase reads naturally (`t!("Projeto salvo.")`)
#   - Missing translations fall back to the key (= the source)
#
# Strings live HERE (Rust side, YAML) and the Slint side lives separately
# in translations/<lang>/adapter-gui.po (gettext). Two catalogs because
# Slint's @tr() only speaks gettext. See docs/i18n.md.

