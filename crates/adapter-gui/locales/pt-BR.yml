# OpenRig — Brazilian Portuguese (source language).
#
# Format: rust-i18n v3 YAML.
# Keys are SEMANTIC TAGS (e.g. error-invalid-block, status-audio-starting).
# NEVER use a source-language string as a key — keys must be stable
# identifiers that survive copy edits.
#
# The Slint side lives separately in translations/<lang>/adapter-gui.po
# (gettext) — two catalogs because @tr() only speaks gettext. See docs/i18n.md.

