# OpenRig — Brazilian Portuguese (source language).
#
# Format: rust-i18n v3 YAML.
# Keys are SEMANTIC TAGS (e.g. error-invalid-block, status-audio-starting).
# NEVER use a source-language string as a key — keys must be stable
# identifiers that survive copy edits.
#
# The Slint side lives separately in translations/<lang>/adapter-gui.po
# (gettext) — two catalogs because @tr() only speaks gettext. See docs/i18n.md.

# --- error-* — error messages
error-block-not-editable: "Esse block ainda não pode ser editado pela GUI."
error-block-not-select: "Block selecionado não é um select."
error-invalid-block: "Block inválido."
error-invalid-chain: "Chain inválida."
error-invalid-preset-file: "arquivo de preset inválido"
error-invalid-recent-project: "Projeto recente inválido."
error-need-input: "É necessário pelo menos uma entrada."
error-need-input-and-output: "Selecione pelo menos um input e um output antes de continuar."
error-need-output: "É necessário pelo menos uma saída."
error-no-chain-editing: "Nenhuma chain em edição."
error-no-project-loaded: "Nenhum projeto carregado."
error-project-name-required: "O nome do projeto é obrigatório."
error-select-device-channels: "Selecione dispositivo e canais."
error-select-invalid: "Seleção do select inválida."
error-select-no-options: "Select sem opções válidas."
error-select-option-missing: "Opção ativa do select não existe."
insert-error-select-return: "Selecione dispositivo e canais de retorno."
insert-error-select-send: "Selecione dispositivo e canais de envio."

# --- warn-* — warnings
warn-add-input: "Adicione pelo menos uma entrada."
warn-add-output: "Adicione pelo menos uma saída."

# --- status-* — info-level toasts
status-audio-disconnected: "Dispositivo de áudio desconectado — reconectando..."
