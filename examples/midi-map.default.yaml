# OpenRig — standard MIDI map (shipped default).
#
# After #499 (ADR 0003) the legacy single `midi-map.yaml` has been split
# in two:
#
#   - `midi-profile.yaml` (system, per-OS config dir) — `input:` only.
#     Which controller to listen to. This file is system-only and never
#     travels with the project.
#
#   - `midi-bindings.yaml` (system fallback, per-OS config dir) — the
#     `bindings:` block. Used when the open project has no `midi:` field.
#     Projects may carry their own bindings in `project.openrig` under
#     `midi.bindings` — those override this file (see docs/midi.md).
#
# This file (`examples/midi-map.default.yaml`) ships with OpenRig as the
# **shipped default**: the resolver falls back to it when no project
# bindings and no system fallback file exist.
#
# OpenRig migrates an existing `midi-map.yaml` (input + bindings) into
# the two files on first launch and deletes the legacy file. No manual
# action.
#
# Convention used here: everything on MIDI channel 1, footswitches as
# Note On (notes 60..67), one knob as Control Change 7. Set your
# controller to send these — see docs/midi.md for the full table.

# Open every connected input port whose name matches this substring.
# Leave it as is for an M-Vave Chocolate; change to match your device.
# Note: in `midi-bindings.yaml` (the system fallback) this `input:` key
# is ignored — the controller comes from `midi-profile.yaml`. The key is
# kept here only so this file remains usable with `--midi=PATH` (legacy
# direct-load) for testing.
input: Chocolate

bindings:
  # ── Presets ───────────────────────────────────────────────────────
  - source: { kind: note_on, channel: 1, note: 60 }   # previous preset
    command: ApplyRigNav
    args: { chain: "rig:guitar", kind: { StepPreset: -1 } }
  - source: { kind: note_on, channel: 1, note: 61 }   # next preset
    command: ApplyRigNav
    args: { chain: "rig:guitar", kind: { StepPreset: 1 } }

  # ── Scenes ────────────────────────────────────────────────────────
  - source: { kind: note_on, channel: 1, note: 62 }   # previous scene
    command: ApplyRigNav
    args: { chain: "rig:guitar", kind: { StepScene: -1 } }
  - source: { kind: note_on, channel: 1, note: 63 }   # next scene
    command: ApplyRigNav
    args: { chain: "rig:guitar", kind: { StepScene: 1 } }

  # ── Block selection (absolute index) ──────────────────────────────
  - source: { kind: note_on, channel: 1, note: 64 }   # select block 0
    command: SelectChainBlock
    args: { chain: "rig:guitar", block_index: 0 }
  - source: { kind: note_on, channel: 1, note: 65 }   # select block 1
    command: SelectChainBlock
    args: { chain: "rig:guitar", block_index: 1 }

  # ── Volume knob ───────────────────────────────────────────────────
  - source: { kind: cc, channel: 1, controller: 7 }   # chain volume 0..200%
    command: SetChainVolume
    args: { chain: "rig:guitar" }
    scale: { min: 0.0, max: 200.0, into: value }
