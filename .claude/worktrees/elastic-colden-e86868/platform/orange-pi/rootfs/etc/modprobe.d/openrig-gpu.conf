# Mali-G610 on RK3588 needs panthor (kernel 6.1+ backport in Armbian vendor
# kernel, matching Mesa 25+ panthor_dri.so on trixie). panfrost is an older
# driver that claims the same DT compat string but does not actually
# support the G610, so when both modules are installed panfrost loads
# first and the GPU ends up unusable by userspace — clients fall back to
# llvmpipe software rendering. Blacklist panfrost so only panthor binds.
blacklist panfrost
