<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- 2x12 cabinet: two speakers side by side -->
  <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cabinet housing -->
    <rect x="8" y="14" width="64" height="54" rx="3" />
    <!-- Center divider -->
    <line x1="40" y1="14" x2="40" y2="68" stroke-width="1" />
    <!-- Left speaker -->
    <circle cx="24" cy="41" r="14" />
    <circle cx="24" cy="41" r="5" />
    <circle cx="24" cy="41" r="2" />
    <!-- Right speaker -->
    <circle cx="56" cy="41" r="14" />
    <circle cx="56" cy="41" r="5" />
    <circle cx="56" cy="41" r="2" />
    <!-- Handle on top -->
    <path d="M32,14 C32,10 48,10 48,14" />
  </g>
</svg>
