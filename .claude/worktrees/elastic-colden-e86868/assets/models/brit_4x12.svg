<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- 4x12 cabinet: 2x2 grid of four speakers -->
  <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cabinet housing -->
    <rect x="6" y="8" width="68" height="66" rx="3" />
    <!-- Center cross dividers -->
    <line x1="40" y1="8" x2="40" y2="74" stroke-width="1" />
    <line x1="6" y1="41" x2="74" y2="41" stroke-width="1" />
    <!-- Top-left speaker -->
    <circle cx="23" cy="25" r="12" />
    <circle cx="23" cy="25" r="4" />
    <!-- Top-right speaker -->
    <circle cx="57" cy="25" r="12" />
    <circle cx="57" cy="25" r="4" />
    <!-- Bottom-left speaker -->
    <circle cx="23" cy="57" r="12" />
    <circle cx="23" cy="57" r="4" />
    <!-- Bottom-right speaker -->
    <circle cx="57" cy="57" r="12" />
    <circle cx="57" cy="57" r="4" />
  </g>
</svg>
