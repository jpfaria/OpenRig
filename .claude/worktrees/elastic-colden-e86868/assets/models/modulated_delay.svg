<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Modulated delay: sine wave with trailing echoes getting smaller -->
  <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main wave -->
    <path d="M8,40 C13,25 19,25 24,40 C29,55 35,55 40,40 C45,25 51,25 56,40 C61,55 67,55 72,40" />
    <!-- Echo 1 (smaller) -->
    <path d="M12,48 C15,41 19,41 22,48 C25,55 29,55 32,48 C35,41 39,41 42,48" stroke-width="1" opacity="0.5" />
    <!-- Echo 2 (even smaller) -->
    <path d="M16,52 C18,48 21,48 23,52 C25,56 28,56 30,52" stroke-width="0.8" opacity="0.25" />
  </g>
</svg>
