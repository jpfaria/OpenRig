<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Tape vintage: reel-to-reel tape recorder (two circles connected) -->
  <g fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left reel outer -->
    <circle cx="24" cy="34" r="16" />
    <!-- Left reel hub -->
    <circle cx="24" cy="34" r="5" />
    <!-- Left reel spokes -->
    <line x1="24" y1="29" x2="24" y2="18" />
    <line x1="20" y1="32" x2="10" y2="28" />
    <line x1="28" y1="32" x2="38" y2="28" />
    <!-- Right reel outer -->
    <circle cx="56" cy="34" r="16" />
    <!-- Right reel hub -->
    <circle cx="56" cy="34" r="5" />
    <!-- Right reel spokes -->
    <line x1="56" y1="29" x2="56" y2="18" />
    <line x1="52" y1="32" x2="42" y2="28" />
    <line x1="60" y1="32" x2="70" y2="28" />
    <!-- Tape path between reels -->
    <path d="M24,50 Q40,60 56,50" />
    <!-- Tape guide rollers -->
    <circle cx="40" cy="58" r="3" />
  </g>
</svg>
