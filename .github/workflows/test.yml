name: Test

on:
  pull_request:
    branches: [develop]
    types: [opened, reopened, synchronize]
  push:
    branches: [develop]

# One run per PR (or per develop push); cancel superseded runs.
concurrency:
  group: test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Whole-repo static gate (file-size caps + no inline test modules). Runs over
  # every tracked file, not just the diff, so debt can't grow outside the frozen
  # allowlist. Build-free (VALIDATE_STATIC_ONLY) — fmt/clippy/slint are the
  # shared quality gate's job, not this one. See issue #793 / #792.
  validate-static:
    name: Static Checks (whole repo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate file sizes and inline test modules
        run: VALIDATE_STATIC_ONLY=1 ./scripts/validate.sh crates

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libudev-dev pkg-config \
            libfontconfig1-dev libseat-dev \
            libxkbcommon-dev libinput-dev libgbm-dev \
            libjack-jackd2-dev

      # The suite must be able to fail the job — no `|| true`. Tests that need
      # the owner's private capture tree (OPENRIG_OWNER_PLUGINS) skip loudly
      # when it is absent; they never hard-fail CI. See issue #793.
      - name: Run tests
        run: cargo test --workspace

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov

      # Coverage is reporting, not a gate: a flaky coverage run must not block a
      # PR whose tests passed, so this step and the upload stay non-blocking.
      - name: Generate coverage report
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info || true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lcov-coverage
          path: lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
