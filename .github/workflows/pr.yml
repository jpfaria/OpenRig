name: PR Quality Gate

on:
  pull_request:
    branches: [develop]
    types: [opened, reopened, synchronize]

# One run per PR; cancel superseded runs to save CI minutes.
concurrency:
  group: pr-quality-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  # Shared gate shipped as a per-language Docker image on GHCR
  # (github.com/xgodev/quality-gate). The image carries the Rust toolchain and
  # the gate; OpenRig's native build deps (alsa/jack/fontconfig/seat/input/gbm/
  # xkbcommon) are declared in `.qg.yaml` `system_packages` and installed by the
  # gate INSIDE the container before it builds either side. The gate ignores the
  # project's clippy.toml/rustfmt.toml on purpose (tamper-resistance) and
  # enforces its own embedded rulesets.
  QG_IMAGE: ghcr.io/xgodev/quality-gate/rust:v1
  QG_LOG_DIR: target/qg-logs

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  quality-gate:
    name: Quality Gate (xgodev/quality-gate image)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true
          # `git archive <base>` builds the baseline from the base ref, which
          # must exist locally — full history + submodules + LFS.
          fetch-depth: 0

      - name: Run quality gate (Docker image)
        id: gate
        run: |
          mkdir -p "$QG_LOG_DIR"
          # origin/develop must resolve locally for the comparative baseline.
          git fetch --quiet origin develop || true
          set +e
          docker run --rm \
            -v "$PWD:/src" -w /src \
            "$QG_IMAGE" \
            --base origin/develop \
            --format json \
            --log-dir "$QG_LOG_DIR" \
            > qg-result.json 2> "$QG_LOG_DIR/qg-stderr.log"
          gate_exit=$?
          set -e
          echo "gate_exit=$gate_exit" >> "$GITHUB_OUTPUT"
          echo "Gate exit: $gate_exit"
          cat qg-result.json 2>/dev/null || true
          # 0 = passed/bypassed, 1 = regressed, 2 = tool/setup error,
          # 3 = no supported language (treat as pass — nothing to gate).
          if [ "$gate_exit" = "0" ] || [ "$gate_exit" = "3" ]; then
            exit 0
          fi
          exit 1

      - name: Upload gate logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qg-logs
          path: |
            target/qg-logs/
            qg-result.json
          if-no-files-found: ignore

      - name: Build failure summary
        if: failure()
        id: summary
        env:
          GATE_EXIT: ${{ steps.gate.outputs.gate_exit }}
        run: |
          set -u
          summary_file=$(mktemp)
          {
            echo "## ❌ Quality gate failed"
            echo ""
            if [ "${GATE_EXIT:-1}" = "2" ]; then
              echo "**Erro de ferramenta/setup (exit 2)** — não é regressão."
              echo "O gate não conseguiu medir (toolchain, baseline inválido,"
              echo "instalação de \`system_packages\`, infra de build). Veja o"
              echo "stderr abaixo."
              echo ""
              echo '```'
              tail -n 60 target/qg-logs/qg-stderr.log 2>/dev/null \
                || echo "(sem stderr capturado)"
              echo '```'
            else
              echo "O PR **piorou** ≥1 métrica vs \`develop\`. Dívida"
              echo "preexistente nunca bloqueia — só regressão do PR."
              echo ""
              echo "Rode o gate compartilhado localmente até passar:"
              echo ""
              echo '```bash'
              echo "docker run --rm -v \"\$PWD:/src\" -w /src \\"
              echo "  ghcr.io/xgodev/quality-gate/rust:v1 --base origin/develop"
              echo '```'
              echo ""
              echo "### Métricas regredidas"
              echo ""
              if jq -e '.metrics' qg-result.json >/dev/null 2>&1; then
                echo "| Métrica | base | PR | Δ |"
                echo "|---|---|---|---|"
                jq -r '.metrics[]
                  | select(.verdict == "regressed")
                  | "| \(.name) | \(.base) | \(.pr) | \(.delta) |"' \
                  qg-result.json
              else
                echo "_(JSON sem métricas — veja logs por etapa)_"
              fi
              echo ""
              echo "### Logs por etapa"
              echo ""
              shopt -s nullglob
              for log in target/qg-logs/pr-*.log; do
                name=$(basename "$log" .log)
                if grep -qE 'error(\[|:)|FAILED|panicked' "$log"; then
                  echo "<details><summary><b>$name</b></summary>"
                  echo ""
                  echo '```'
                  tail -n 60 "$log"
                  echo '```'
                  echo ""
                  echo "</details>"
                  echo ""
                fi
              done
            fi
            echo ""
            echo "### Run"
            echo ""
            echo "[View full CI log](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo ""
            echo "_Posted by quality-gate workflow — shared gate image \`ghcr.io/xgodev/quality-gate/rust:v1\`. Issue #482._"
          } > "$summary_file"
          {
            echo 'body<<__QG_BODY__'
            cat "$summary_file"
            echo '__QG_BODY__'
          } >> "$GITHUB_OUTPUT"

      - name: Post sticky failure comment
        if: failure()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: openrig-quality-gate
          message: ${{ steps.summary.outputs.body }}

      - name: Request changes on PR
        if: failure() && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          existing=$(gh pr view "$PR_NUMBER" --json reviews \
            --jq '[.reviews[] | select(.author.login == "github-actions" and .state == "CHANGES_REQUESTED")] | length')
          if [ "${existing:-0}" = "0" ]; then
            gh pr review "$PR_NUMBER" \
              --request-changes \
              --body "Quality gate failed — see sticky comment for diagnostic. Resolve and push again."
          else
            echo "github-actions already has CHANGES_REQUESTED on this PR — not stacking."
          fi

      - name: Post sticky success comment
        if: success()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: openrig-quality-gate
          message: |
            ## ✅ Quality gate passed

            Comparativo (PR vs `develop`) pelo gate compartilhado
            `xgodev/quality-gate` (imagem `rust:v1`): nenhuma métrica regrediu.
            Verificadas: fmt, lint, build, test, complexity, coverage.

            _Posted by quality-gate workflow — issue #482._

      - name: Dismiss prior request-changes review on success
        if: success() && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          ids=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
            --jq '[.[] | select(.user.login == "github-actions[bot]" and .state == "CHANGES_REQUESTED") | .id] | .[]')
          for id in $ids; do
            gh api -X PUT "repos/${REPO}/pulls/${PR_NUMBER}/reviews/${id}/dismissals" \
              -f message="Quality gate is now green." || true
          done
