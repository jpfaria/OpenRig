name: PR Quality Gate

on:
  pull_request:
    branches: [develop]
    types: [opened, reopened, synchronize]

# One run per PR; cancel superseded runs to save CI minutes.
concurrency:
  group: pr-quality-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Shared gate: github.com/xgodev/quality-gate (dispatcher `qg`).
  # The gate ignores the project's clippy.toml/rustfmt.toml on purpose
  # (tamper-resistance) and uses its own embedded rulesets.
  QG_LOG_DIR: target/qg-logs

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  quality-gate:
    name: Quality Gate (shared xgodev/quality-gate)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true
          fetch-depth: 0

      - name: Checkout base ref into baseline/
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: baseline
          submodules: recursive
          lfs: true
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: pr-quality

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libudev-dev pkg-config \
            libfontconfig1-dev libseat-dev \
            libxkbcommon-dev libinput-dev libgbm-dev \
            libjack-jackd2-dev

      - name: Clone shared quality gate
        run: |
          git clone --depth 1 \
            https://github.com/xgodev/quality-gate.git "$HOME/.quality-gate"
          echo "QG_REV=$(git -C "$HOME/.quality-gate" rev-parse --short HEAD)" \
            >> "$GITHUB_ENV"

      - name: Run quality gate
        id: gate
        env:
          # Pre-prepared base checkout — skips `git archive` extraction.
          QG_BASELINE_DIR: ${{ github.workspace }}/baseline
        run: |
          mkdir -p target/qg-logs
          # origin/develop must resolve locally for diff/labelling.
          git fetch --quiet origin develop || true
          set +e
          "$HOME/.quality-gate/qg" \
            --base origin/develop \
            --baseline-dir "$QG_BASELINE_DIR" \
            --force-full \
            --format json \
            --log-dir target/qg-logs \
            > qg-result.json 2> target/qg-logs/qg-stderr.log
          gate_exit=$?
          set -e
          echo "gate_exit=$gate_exit" >> "$GITHUB_OUTPUT"
          echo "Gate exit: $gate_exit (rev ${QG_REV:-?})"
          cat qg-result.json 2>/dev/null || true
          # 0 = passed/bypassed, 1 = regressed, 2 = tool/setup error,
          # 3 = no supported language (treat as pass — nothing to gate).
          if [ "$gate_exit" = "0" ] || [ "$gate_exit" = "3" ]; then
            exit 0
          fi
          exit 1

      - name: Upload gate logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qg-logs
          path: |
            target/qg-logs/
            qg-result.json
          if-no-files-found: ignore

      - name: Generate lcov.info for Codecov (reuses PR coverage run)
        # Pula quando o gate tomou o fast-path / não rodou llvm-cov:
        # sem `target/llvm-cov-target/**/*.profraw` o report falha.
        if: success() && hashFiles('target/llvm-cov-target/**/*.profraw') != ''
        run: cargo llvm-cov report --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        if: success() && hashFiles('lcov.info') != ''
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build failure summary
        if: failure()
        id: summary
        env:
          GATE_EXIT: ${{ steps.gate.outputs.gate_exit }}
        run: |
          set -u
          summary_file=$(mktemp)
          {
            echo "## ❌ Quality gate failed"
            echo ""
            if [ "${GATE_EXIT:-1}" = "2" ]; then
              echo "**Erro de ferramenta/setup (exit 2)** — não é regressão."
              echo "O gate não conseguiu medir (tool faltando, baseline"
              echo "inválido, infra de build). Veja o stderr abaixo."
              echo ""
              echo '```'
              tail -n 60 target/qg-logs/qg-stderr.log 2>/dev/null \
                || echo "(sem stderr capturado)"
              echo '```'
            else
              echo "O PR **piorou** ≥1 métrica vs \`develop\`. Dívida"
              echo "preexistente nunca bloqueia — só regressão do PR."
              echo ""
              echo "Rode o gate compartilhado localmente até passar:"
              echo ""
              echo '```bash'
              echo "git -C ~/.quality-gate pull --ff-only \\"
              echo "  || git clone --depth 1 \\"
              echo "       https://github.com/xgodev/quality-gate.git \\"
              echo "       ~/.quality-gate"
              echo "~/.quality-gate/qg --base origin/develop"
              echo '```'
              echo ""
              echo "### Métricas regredidas"
              echo ""
              if jq -e '.metrics' qg-result.json >/dev/null 2>&1; then
                echo "| Métrica | base | PR | Δ |"
                echo "|---|---|---|---|"
                jq -r '.metrics[]
                  | select(.verdict == "regressed")
                  | "| \(.name) | \(.base) | \(.pr) | \(.delta) |"' \
                  qg-result.json
              else
                echo "_(JSON sem métricas — veja logs por etapa)_"
              fi
              echo ""
              echo "### Logs por etapa"
              echo ""
              shopt -s nullglob
              for log in target/qg-logs/pr-*.log; do
                name=$(basename "$log" .log)
                if grep -qE 'error(\[|:)|FAILED|panicked' "$log"; then
                  echo "<details><summary><b>$name</b></summary>"
                  echo ""
                  echo '```'
                  tail -n 60 "$log"
                  echo '```'
                  echo ""
                  echo "</details>"
                  echo ""
                fi
              done
            fi
            echo ""
            echo "### Run"
            echo ""
            echo "[View full CI log](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo ""
            echo "_Posted by quality-gate workflow — shared gate \`xgodev/quality-gate@${QG_REV:-?}\`. Issue #482._"
          } > "$summary_file"
          {
            echo 'body<<__QG_BODY__'
            cat "$summary_file"
            echo '__QG_BODY__'
          } >> "$GITHUB_OUTPUT"

      - name: Post sticky failure comment
        if: failure()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: openrig-quality-gate
          message: ${{ steps.summary.outputs.body }}

      - name: Request changes on PR
        if: failure() && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          existing=$(gh pr view "$PR_NUMBER" --json reviews \
            --jq '[.reviews[] | select(.author.login == "github-actions" and .state == "CHANGES_REQUESTED")] | length')
          if [ "${existing:-0}" = "0" ]; then
            gh pr review "$PR_NUMBER" \
              --request-changes \
              --body "Quality gate failed — see sticky comment for diagnostic. Resolve and push again."
          else
            echo "github-actions already has CHANGES_REQUESTED on this PR — not stacking."
          fi

      - name: Post sticky success comment
        if: success()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: openrig-quality-gate
          message: |
            ## ✅ Quality gate passed

            Comparativo (PR vs `develop`) pelo gate compartilhado
            `xgodev/quality-gate`: nenhuma métrica regrediu.
            Verificadas: fmt, lint, build, test, complexity, coverage.

            _Posted by quality-gate workflow — issue #482._

      - name: Dismiss prior request-changes review on success
        if: success() && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          ids=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/reviews" \
            --jq '[.[] | select(.user.login == "github-actions[bot]" and .state == "CHANGES_REQUESTED") | .id] | .[]')
          for id in $ids; do
            gh api -X PUT "repos/${REPO}/pulls/${PR_NUMBER}/reviews/${id}/dismissals" \
              -f message="Quality gate is now green." || true
          done
