name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned, labeled]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          assignee_trigger: "claude"
          label_trigger: "claude"
          base_branch: "develop"
          branch_prefix: "feature/"
          plugins: |
            superpowers@claude-plugins-official
          prompt: |
            You MUST follow the project's CLAUDE.md strictly. Key rules:
            - Gitflow: always branch from develop, never from main
            - Branch naming: feature/issue-{N}-description or bugfix/issue-{N}-description
            - PR target: always develop, never main
            - Commits in English, no Co-Authored-By
            - Zero warnings on cargo build
            - Zero coupling: blocks never reference specific models or brands
            - Read .claude/skills/openrig-code-quality/SKILL.md before writing any code
            - Always run cargo build and verify zero warnings before committing
            - PR body must include "Closes #{issue_number}"
