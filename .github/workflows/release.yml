  # --------------------------------------------------------------------------
  # Windows x64: .zip (full bundle) + .msi (installer)
  # --------------------------------------------------------------------------
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-x64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-x64-cargo-

      - name: Build
        run: cargo build --release -p adapter-gui

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="${{ inputs.version }}"
            V="${V:-0.0.0-dev}"
          fi
          echo "v=${V}" >> "$GITHUB_OUTPUT"

      - name: Create .zip bundle
        env:
          VERSION: ${{ steps.ver.outputs.v }}
        shell: bash
        run: |
          D="OpenRig-${VERSION}-windows-x64"
          mkdir -p "dist/${D}/libs/lv2"
          mkdir -p "dist/${D}/libs/nam"

          cp target/release/adapter-gui.exe       "dist/${D}/openrig.exe"
          cp libs/nam/windows-x64/libNeuralAudioCAPI.dll "dist/${D}/"
          cp -r libs/lv2/windows-x64             "dist/${D}/libs/lv2/windows-x64" 2>/dev/null || true
          cp -r data/lv2                         "dist/${D}/data"
          cp -r assets                           "dist/${D}/assets"
          cp -r captures                         "dist/${D}/captures"

          cd dist
          7z a "${D}.zip" "${D}"

      - name: Install WiX Toolset v3
        run: choco install wixtoolset -y --no-progress || true

      - name: Install cargo-wix
        run: cargo install cargo-wix --locked

      - name: Copy NAM DLL next to binary for MSI bundling
        shell: bash
        run: cp libs/nam/windows-x64/libNeuralAudioCAPI.dll target/release/

      - name: Generate WiX template and build .msi
        env:
          VERSION: ${{ steps.ver.outputs.v }}
        shell: bash
        run: |
          cargo wix init -p adapter-gui --force
          cargo wix -p adapter-gui \
            --no-build \
            --name OpenRig \
            --output "target/wix/OpenRig-${VERSION}-windows-x64.msi"

      - uses: actions/upload-artifact@v4
        with:
          name: openrig-windows-x64
          path: |
            dist/OpenRig-*-windows-x64.zip
            target/wix/OpenRig-*.msi

  # --------------------------------------------------------------------------
  # GitHub Release (only on tag push)
  # --------------------------------------------------------------------------
  create-release:
    name: Create GitHub Release
    needs: [build-macos, build-linux-x86_64, build-linux-aarch64, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release notes from milestone
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          VERSION="${TAG#v}"

          MILESTONE_NUMBER=$(gh api "repos/${REPO}/milestones?state=all&per_page=100" \
            | jq -r --arg ver "$VERSION" --arg tag "$TAG" \
              '.[] | select(.title == $ver or .title == $tag) | .number' \
            | head -1)

          if [ -z "$MILESTONE_NUMBER" ]; then
            echo "No milestone found for ${TAG}, using auto-generated notes"
            echo "milestone_number=" >> "$GITHUB_OUTPUT"
            echo "use_generated=true" >> "$GITHUB_OUTPUT"
          else
            echo "Found milestone #${MILESTONE_NUMBER}"
            echo "milestone_number=${MILESTONE_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "use_generated=false" >> "$GITHUB_OUTPUT"

            ITEMS=$(gh api "repos/${REPO}/issues?milestone=${MILESTONE_NUMBER}&state=closed&per_page=100")

            PRS=$(echo "$ITEMS" | jq -r '.[] | select(.pull_request) | "- " + .title + " (#" + (.number|tostring) + ")"')
            ISSUES=$(echo "$ITEMS" | jq -r '.[] | select(.pull_request == null) | "- " + .title + " (#" + (.number|tostring) + ")"')

            NOTES="## What's Changed"
            if [ -n "$PRS" ]; then
              NOTES+=$'\n\n### Pull Requests\n'"$PRS"
            fi
            if [ -n "$ISSUES" ]; then
              NOTES+=$'\n\n### Issues Fixed\n'"$ISSUES"
            fi

            {
              echo "notes<<RELEASE_NOTES_EOF"
              echo "$NOTES"
              echo "RELEASE_NOTES_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          NOTES: ${{ steps.notes.outputs.notes }}
          USE_GENERATED: ${{ steps.notes.outputs.use_generated }}
        run: |
          mapfile -t FILES < <(find artifacts -type f | sort)
          if [ "$USE_GENERATED" = "true" ]; then
            gh release create "$TAG" \
              --repo "$REPO" \
              --title "OpenRig $TAG" \
              --generate-notes \
              "${FILES[@]}"
          else
            gh release create "$TAG" \
              --repo "$REPO" \
              --title "OpenRig $TAG" \
              --notes "$NOTES" \
              "${FILES[@]}"
          fi

      - name: Close milestone
        if: steps.notes.outputs.milestone_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          MILESTONE_NUMBER: ${{ steps.notes.outputs.milestone_number }}
        run: |
          gh api "repos/${REPO}/milestones/${MILESTONE_NUMBER}" \
            -X PATCH \
            -f state=closed
          echo "Closed milestone #${MILESTONE_NUMBER}"
