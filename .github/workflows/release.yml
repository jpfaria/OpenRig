name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.1.0)'
        required: false
        default: 'dev'

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # --------------------------------------------------------------------------
  # macOS universal binary + .app bundle + .dmg
  # --------------------------------------------------------------------------
  build-macos:
    name: Build macOS (universal)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-

      - name: Resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="${{ inputs.version }}"
            V="${V:-dev}"
          fi
          echo "v=${V}" >> "$GITHUB_OUTPUT"

      - name: Build and package
        env:
          VERSION: ${{ steps.ver.outputs.v }}
        run: ./scripts/package-macos.sh "$VERSION"

      - uses: actions/upload-artifact@v4
        with:
          name: openrig-macos
          path: dist/OpenRig-*-macos-universal.dmg

  # --------------------------------------------------------------------------
  # Linux x86_64: .tar.gz + .deb + .rpm + .AppImage
  # --------------------------------------------------------------------------
  build-linux-x86_64:
    name: Build Linux x86_64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libudev-dev pkg-config \
            fakeroot rpm ruby-dev build-essential imagemagick

      - name: Install fpm
        run: sudo gem install fpm --no-document

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-x86_64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-x86_64-cargo-

      - name: Build
        run: cargo build --release -p adapter-gui

      - name: Resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="${{ inputs.version }}"
            V="${V:-0.0.0-dev}"
          fi
          echo "v=${V}" >> "$GITHUB_OUTPUT"

      - name: Stage install tree
        run: |
          S=dist/stage
          mkdir -p "$S/usr/bin"
          mkdir -p "$S/usr/lib/openrig/libs/lv2"
          mkdir -p "$S/usr/lib/openrig/libs/nam"
          mkdir -p "$S/usr/share/openrig/data"
          mkdir -p "$S/usr/share/openrig/assets"

          cp target/release/adapter-gui    "$S/usr/bin/openrig"
          cp -r libs/lv2/linux-x86_64      "$S/usr/lib/openrig/libs/lv2/linux-x86_64"
          cp -r libs/nam/linux-x86_64      "$S/usr/lib/openrig/libs/nam/linux-x86_64"
          cp -r data/lv2                   "$S/usr/share/openrig/data/lv2"
          cp -r assets                     "$S/usr/share/openrig/assets"
          cp -r captures                   "$S/usr/share/openrig/captures"

      - name: Create .tar.gz
        env:
          VERSION: ${{ steps.ver.outputs.v }}
        run: |
          D="openrig-${VERSION}-linux-x86_64"
          mkdir -p "dist/${D}"
          cp dist/stage/usr/bin/openrig               "dist/${D}/openrig"
          cp -r dist/stage/usr/lib/openrig/libs       "dist/${D}/libs"
          cp -r dist/stage/usr/share/openrig/data     "dist/${D}/data"
          cp -r dist/stage/usr/share/openrig/assets   "dist/${D}/assets"
          cp -r dist/stage/usr/share/openrig/captures "dist/${D}/captures"
          tar -czf "dist/${D}.tar.gz" -C dist "${D}"

      - name: Create .deb
        env:
          VERSION: ${{ steps.ver.outputs.v }}
        run: |
          fpm -s dir -t deb \
            -n openrig -v "${VERSION}" \
            --architecture x86_64 \
            --description "OpenRig virtual guitar pedalboard" \
            --url "https://github.com/jpfaria/OpenRig" \
            --maintainer "Joao Paulo Faria" \
            --category sound \
            --depends libasound2 \
            --deb-no-default-config-files \
            -C dist/stage \
            --package "dist/openrig_${VERSION}_amd64.deb" \
            usr

      - name: Create .rpm
        env:
          VERSION: ${{ steps.ver.outputs.v }}
        run: |
          fpm -s dir -t rpm \
            -n openrig -v "${VERSION}" \
            --architecture x86_64 \
            --description "OpenRig virtual guitar pedalboard" \
            --url "https://github.com/jpfaria/OpenRig" \
            --maintainer "Joao Paulo Faria" \
            --category "Applications/Multimedia" \
            -C dist/stage \
            --package "dist/openrig-${VERSION}-1.x86_64.rpm" \
            usr

      - name: Create AppImage (x86_64)
        env:
          VERSION: ${{ steps.ver.outputs.v }}
        run: |
          curl -fsSL -o appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

          APPDIR=dist/AppDir
          cp -r dist/stage "$APPDIR"

          printf '%s\n' \
            '#!/bin/bash' \
            'HERE="$(dirname "$(readlink -f "${0}")")"' \
            'export OPENRIG_LIBS_DIR="$HERE/usr/lib/openrig/libs"' \
            'export OPENRIG_DATA_DIR="$HERE/usr/share/openrig/data"' \
            'export OPENRIG_ASSETS_DIR="$HERE/usr/share/openrig/assets"' \
            'export OPENRIG_CAPTURES_DIR="$HERE/usr/share/openrig/captures"' \
            'exec "$HERE/usr/bin/openrig" "$@"' \
            > "$APPDIR/AppRun"
          chmod +x "$APPDIR/AppRun"

          printf '%s\n' \
            '[Desktop Entry]' \
            'Name=OpenRig' \
            'Exec=openrig' \
            'Icon=openrig' \
            'Type=Application' \
            'Categories=Audio;Music;' \
            > "$APPDIR/openrig.desktop"

          convert -size 256x256 xc:'#1a1a2e' \
            -fill white -font DejaVu-Sans-Bold -pointsize 80 \
            -gravity center -annotate 0 'OR' \
            "$APPDIR/openrig.png"

          APPIMAGE_EXTRACT_AND_RUN=1 ARCH=x86_64 ./appimagetool "$APPDIR" \
            "dist/OpenRig-${VERSION}-linux-x86_64.AppImage"

      - uses: actions/upload-artifact@v4
        with:
          name: openrig-linux-x86_64
          path: |
            dist/openrig-*-linux-x86_64.tar.gz
            dist/openrig_*_amd64.deb
            dist/openrig-*-1.x86_64.rpm
            dist/OpenRig-*-linux-x86_64.AppImage

  # --------------------------------------------------------------------------
  # Linux aarch64: .tar.gz + .deb + .rpm + .AppImage
  # --------------------------------------------------------------------------
  build-linux-aarch64:
    name: Build Linux aarch64
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libudev-dev pkg-config \
            fakeroot rpm ruby-dev build-essential imagemagick

      - name: Install fpm
        run: sudo gem install fpm --no-document

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-aarch64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-aarch64-cargo-

