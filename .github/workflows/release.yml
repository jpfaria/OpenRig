name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.1.0)'
        required: false
        default: 'dev'

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # --------------------------------------------------------------------------
  # macOS universal binary + .app bundle + .dmg
  # --------------------------------------------------------------------------
  build-macos:
    name: Build macOS (universal)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-

      - name: Resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="${{ inputs.version }}"
            V="${V:-dev}"
          fi
          echo "v=${V}" >> "$GITHUB_OUTPUT"

      - name: Build and package
        env:
          VERSION: ${{ steps.ver.outputs.v }}
        run: ./scripts/package-macos.sh "$VERSION"

      - uses: actions/upload-artifact@v4
        with:
          name: openrig-macos
          path: dist/OpenRig-*-macos-universal.dmg

  # --------------------------------------------------------------------------
  # Linux x86_64: .tar.gz + .deb + .rpm + .AppImage
  # --------------------------------------------------------------------------
  build-linux-x86_64:
    name: Build Linux x86_64
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libudev-dev pkg-config \
            libfontconfig1-dev libseat-dev \
            libxkbcommon-dev libinput-dev libgbm-dev \
            libjack-jackd2-dev \
            fakeroot rpm ruby-dev build-essential \
            librsvg2-bin imagemagick \
            gettext

      - name: Install fpm
        run: sudo gem install fpm --no-document

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-x86_64-u24-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-x86_64-u24-cargo-

      - name: Resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="${{ inputs.version }}"
            V="${V:-0.0.0-dev}"
          fi
          echo "v=${V}" >> "$GITHUB_OUTPUT"

      - name: Build and package
        env:
          VERSION: ${{ steps.ver.outputs.v }}
        run: ./scripts/package-linux.sh --arch x86_64 --version "$VERSION"

      - uses: actions/upload-artifact@v4
        with:
          name: openrig-linux-x86_64
          path: |
            dist/openrig-*-linux-x86_64.tar.gz
            dist/openrig_*_amd64.deb
            dist/openrig-*-1.x86_64.rpm
            dist/OpenRig-*-linux-x86_64.AppImage

  # --------------------------------------------------------------------------
  # Linux aarch64: .tar.gz + .deb + .rpm + .AppImage
  # --------------------------------------------------------------------------
  build-linux-aarch64:
    name: Build Linux aarch64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libudev-dev pkg-config \
            libfontconfig1-dev libseat-dev \
            libxkbcommon-dev libinput-dev libgbm-dev \
            libjack-jackd2-dev \
            fakeroot rpm ruby-dev build-essential \
            librsvg2-bin imagemagick \
            gettext

      - name: Install fpm
        run: sudo gem install fpm --no-document

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-aarch64-u24-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-aarch64-u24-cargo-

      - name: Resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="${{ inputs.version }}"
            V="${V:-0.0.0-dev}"
          fi
          echo "v=${V}" >> "$GITHUB_OUTPUT"

      - name: Build and package
        env:
          VERSION: ${{ steps.ver.outputs.v }}
        run: ./scripts/package-linux.sh --arch aarch64 --version "$VERSION"

      - uses: actions/upload-artifact@v4
        with:
          name: openrig-linux-aarch64
          path: |
            dist/openrig-*-linux-aarch64.tar.gz
            dist/openrig_*_arm64.deb
            dist/openrig-*-1.aarch64.rpm
            dist/OpenRig-*-linux-aarch64.AppImage

  # --------------------------------------------------------------------------
  # Windows x64: .zip (full bundle) + .msi (installer)
  # --------------------------------------------------------------------------
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-x64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-x64-cargo-

      - name: Download ASIO SDK
        shell: pwsh
        run: |
          $sdk_url = "https://download.steinberg.net/sdk_downloads/asiosdk_2.3.3_2019-06-14.zip"
          Invoke-WebRequest -Uri $sdk_url -OutFile asiosdk.zip
          Expand-Archive -Path asiosdk.zip -DestinationPath C:\asiosdk
          $sdk_dir = (Get-ChildItem C:\asiosdk -Directory)[0].FullName
          "CPAL_ASIO_DIR=$sdk_dir" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "ASIO SDK: $sdk_dir"

      - name: Install LLVM/clang (required by ASIO bindgen)
        run: choco install llvm -y --no-progress

      - name: Build
        run: cargo build --release -p adapter-gui

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="${{ inputs.version }}"
            V="${V:-0.0.0-dev}"
          fi
          echo "v=${V}" >> "$GITHUB_OUTPUT"

      - name: Install WiX Toolset v3
        run: choco install wixtoolset -y --no-progress

      - name: Install MinGW runtime DLLs (needed by libNeuralAudioCAPI.dll)
        shell: cmd
        run: C:\msys64\usr\bin\pacman.exe -S --noconfirm --needed mingw-w64-x86_64-gcc-libs mingw-w64-x86_64-winpthreads-git

      - name: Package (.zip + .msi)
        env:
          VERSION: ${{ steps.ver.outputs.v }}
        shell: pwsh
        run: .\scripts\package-windows.ps1 "$env:VERSION"

      - uses: actions/upload-artifact@v4
        with:
          name: openrig-windows-x64
          path: |
            dist/OpenRig-*-windows-x64.zip
            dist/OpenRig-*-windows-x64.msi

  # --------------------------------------------------------------------------
  # GitHub Release (only on tag push)
  # --------------------------------------------------------------------------
  create-release:
    name: Create GitHub Release
    needs: [build-macos, build-linux-x86_64, build-linux-aarch64, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release notes from milestone
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          VERSION="${TAG#v}"

          MILESTONE_NUMBER=$(gh api "repos/${REPO}/milestones?state=all&per_page=100" \
            | jq -r --arg ver "$VERSION" --arg tag "$TAG" \
              '.[] | select(.title == $ver or .title == $tag) | .number' \
            | head -1)

          if [ -z "$MILESTONE_NUMBER" ]; then
            echo "No milestone found for ${TAG}, using auto-generated notes"
            echo "milestone_number=" >> "$GITHUB_OUTPUT"
            echo "use_generated=true" >> "$GITHUB_OUTPUT"
          else
            echo "Found milestone #${MILESTONE_NUMBER}"
            echo "milestone_number=${MILESTONE_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "use_generated=false" >> "$GITHUB_OUTPUT"

            OWNER="${REPO%%/*}"
            NAME="${REPO#*/}"

            # Only fetch issues — this project merges feature/bugfix branches
            # directly into develop without PRs, so milestone.pullRequests is
            # always empty. The PR query also hits a GraphQL backend bug that
            # consistently returns "Something went wrong" 500.
            ISSUES_JSON=$(gh api graphql -f query='
              query($owner: String!, $name: String!, $number: Int!) {
                repository(owner: $owner, name: $name) {
                  milestone(number: $number) {
                    issues(states: CLOSED, first: 100, orderBy: {field: CREATED_AT, direction: DESC}) {
                      nodes { number title labels(first: 20) { nodes { name } } }
                    }
                  }
                }
              }' -F owner="$OWNER" -F name="$NAME" -F number="$MILESTONE_NUMBER")

            # Exclude items labeled "duplicate" (work shipped in the twin
            # issue) or "internal" (CI, build, scripts, project tooling
            # — not user-facing changes).
            FILTER='select(([.labels.nodes[].name] | any(. == "duplicate" or . == "internal")) | not)'

            PRS=""
            ISSUES=$(echo "$ISSUES_JSON" | jq -r ".data.repository.milestone.issues.nodes[] | $FILTER | \"- \" + .title + \" (#\" + (.number|tostring) + \")\"")

            NOTES="## What's Changed"
            if [ -n "$PRS" ]; then
              NOTES+=$'\n\n### Pull Requests\n'"$PRS"
            fi
            if [ -n "$ISSUES" ]; then
              NOTES+=$'\n\n### Issues Fixed\n'"$ISSUES"
            fi

            {
              echo "notes<<RELEASE_NOTES_EOF"
              echo "$NOTES"
              echo "RELEASE_NOTES_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          NOTES: ${{ steps.notes.outputs.notes }}
          USE_GENERATED: ${{ steps.notes.outputs.use_generated }}
        run: |
          mapfile -t FILES < <(find artifacts -type f | sort)
          if [ "$USE_GENERATED" = "true" ]; then
            gh release create "$TAG" \
              --repo "$REPO" \
              --title "OpenRig $TAG" \
              --generate-notes \
              "${FILES[@]}"
          else
            gh release create "$TAG" \
              --repo "$REPO" \
              --title "OpenRig $TAG" \
              --notes "$NOTES" \
              "${FILES[@]}"
          fi

      - name: Close milestone
        if: steps.notes.outputs.milestone_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          MILESTONE_NUMBER: ${{ steps.notes.outputs.milestone_number }}
        run: |
          gh api "repos/${REPO}/milestones/${MILESTONE_NUMBER}" \
            -X PATCH \
            -f state=closed
          echo "Closed milestone #${MILESTONE_NUMBER}"
