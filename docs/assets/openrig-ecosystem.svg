    <rect x="1076" y="196" width="256" height="156" rx="30" stroke="#CBD5E1" stroke-width="2"/>
    <text x="1204" y="250" text-anchor="middle" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">VST3 Plugin</text>
    <text x="1204" y="286" text-anchor="middle" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18">Shared engine and GUI</text>
    <text x="1204" y="312" text-anchor="middle" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18">inside DAWs.</text>
  </g>

  <g filter="url(#cardShadow)">
