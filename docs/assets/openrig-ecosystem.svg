    <rect x="108" y="646" width="256" height="156" rx="30" stroke="#CBD5E1" stroke-width="2"/>
    <text x="236" y="700" text-anchor="middle" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">Server Mode</text>
    <text x="236" y="736" text-anchor="middle" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18">Headless host for remote</text>
    <text x="236" y="762" text-anchor="middle" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18">automation and control APIs.</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="1076" y="646" width="256" height="156" rx="30" fill="#FFFFFF"/>
    <rect x="1076" y="646" width="256" height="156" rx="30" stroke="#CBD5E1" stroke-width="2"/>
    <text x="1204" y="700" text-anchor="middle" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">Own Hardware</text>
    <text x="1204" y="736" text-anchor="middle" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18">Dedicated unit with screen,</text>
    <text x="1204" y="762" text-anchor="middle" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18">foot control, and custom case.</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="566" y="686" width="308" height="126" rx="30" fill="#FFFFFF"/>
    <rect x="566" y="686" width="308" height="126" rx="30" stroke="#CBD5E1" stroke-width="2"/>
    <text x="720" y="732" text-anchor="middle" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">Flutter Remote UI</text>
    <text x="720" y="766" text-anchor="middle" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18">Desktop and mobile control clients</text>
  </g>

