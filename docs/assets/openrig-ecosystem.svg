<svg width="1440" height="920" viewBox="0 0 1440 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="114" y1="74" x2="1320" y2="844" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="signal" x1="286" y1="242" x2="1158" y2="694" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F97316"/>
      <stop offset="0.5" stop-color="#FB7185"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="160%" height="170%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1440" height="920" fill="url(#bg)"/>

  <text x="90" y="94" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="50" font-weight="700">OpenRig Platform</text>
  <text x="90" y="134" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="24">A single DSP architecture serving local apps, DAWs, remote control, and dedicated hardware.</text>

  <g filter="url(#cardShadow)">
    <rect x="452" y="282" width="536" height="332" rx="40" fill="url(#dark)"/>
    <rect x="468" y="298" width="504" height="300" rx="30" stroke="#FFFFFF" stroke-opacity="0.08"/>

    <text x="720" y="356" text-anchor="middle" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700">OpenRig Core</text>
    <text x="720" y="398" text-anchor="middle" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="22">Pedalboard setup • runtime graph • audio processing • state</text>

    <rect x="520" y="436" width="132" height="98" rx="24" fill="#0B1220" stroke="#F97316" stroke-opacity="0.45"/>
    <rect x="668" y="436" width="132" height="98" rx="24" fill="#0B1220" stroke="#FB7185" stroke-opacity="0.45"/>
    <rect x="816" y="436" width="132" height="98" rx="24" fill="#0B1220" stroke="#38BDF8" stroke-opacity="0.45"/>

    <text x="586" y="476" text-anchor="middle" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">NAM</text>
    <text x="586" y="504" text-anchor="middle" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="16">amp and pedal capture</text>

    <text x="734" y="476" text-anchor="middle" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">IR</text>
    <text x="734" y="504" text-anchor="middle" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="16">cab and convolution path</text>

    <text x="882" y="476" text-anchor="middle" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">FX</text>
    <text x="882" y="504" text-anchor="middle" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="16">delay, reverb, EQ, dynamics</text>

    <path d="M544 564C598 534 640 534 694 564" stroke="#F97316" stroke-width="6" stroke-linecap="round"/>
    <path d="M706 564C760 534 802 534 856 564" stroke="#FB7185" stroke-width="6" stroke-linecap="round"/>
    <path d="M868 564C904 546 934 546 970 564" stroke="#38BDF8" stroke-width="6" stroke-linecap="round"/>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="108" y="196" width="256" height="156" rx="30" fill="#FFFFFF"/>
    <rect x="108" y="196" width="256" height="156" rx="30" stroke="#CBD5E1" stroke-width="2"/>
    <text x="236" y="250" text-anchor="middle" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">Standalone</text>
    <text x="236" y="286" text-anchor="middle" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18">Desktop app for Windows,</text>
    <text x="236" y="312" text-anchor="middle" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18">macOS, and Linux.</text>
  </g>

  <g filter="url(#cardShadow)">
