# Default audio device: Teyun Q-26 (USB)
# Uses type plug for format/rate conversion and resilience if device is briefly unavailable.
# The udev rule in customize-image.sh pins it as card "Q26".
# Verify on first boot with: aplay -l

pcm.!default {
    type plug
    slave.pcm "hw:Q26"
}

ctl.!default {
    type hw
    card Q26
}
