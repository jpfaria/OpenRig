# Disable scarlett2 vendor-specific mixer initialization for the Focusrite Scarlett 2i2.
# With device_setup=0, snd-usb-audio skips the scarlett2 mixer init for this device,
# preventing notification subscription (0x20000000) that causes periodic USB resets.
# JACK opening the PCM is sufficient to switch the device to USB mode (green LED).
options snd-usb-audio vid=0x1235 pid=0x8219 device_setup=0
