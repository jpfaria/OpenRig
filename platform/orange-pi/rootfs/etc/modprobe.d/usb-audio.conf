# Disable the scarlett2 mixer protocol for all USB audio devices.
# With device_setup=0, snd-usb-audio treats every USB audio device as a
# plain USB Audio Class 2.0 device — no vendor-specific initialization.
#
# Why: the scarlett2 driver sends USB vendor commands to Focusrite devices
# during initialization, which causes the firmware to emit periodic
# 0x20000000 notifications. The in-kernel driver logs these as
# "Unhandled notification" and never responds, so the firmware eventually
# triggers a USB reset cycle (disconnect + reconnect). This makes the
# device disappear and reappear every few minutes while JACK is running.
#
# With device_setup=0: no vendor commands are sent, no notifications are
# generated, the device stays connected indefinitely.
#
# Trade-off: Focusrite Control (the proprietary mixer app) will no longer
# work, but OpenRig uses JACK directly and does not need it.
# Target Focusrite specifically by VID (0x1235) and PID (0x8219 = Scarlett 2i2 4th Gen).
# This ensures device_setup=0 applies to the Scarlett regardless of probe order.
options snd-usb-audio vid=0x1235 pid=0x8219 device_setup=0
