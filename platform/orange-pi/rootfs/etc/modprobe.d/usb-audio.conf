# Force generic USB Audio Class driver for all USB audio interfaces.
# Prevents vendor-specific quirk drivers (e.g. scarlett-gen2) from subscribing
# to device notifications that cause USB disconnects on RK3588 xHCI.
# Generic UAC2 mode works correctly with JACK for all interfaces tested.
options snd-usb-audio quirk_alias=0x12358219:0x00000000
