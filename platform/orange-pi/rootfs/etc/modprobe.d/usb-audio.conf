# Disable scarlett2 vendor-specific mixer initialization for the Focusrite Scarlett 2i2.
# device_setup=1 sets QUIRK_SETUP_DISABLE_MIXER, preventing the scarlett2 driver from
# subscribing to firmware notifications (0x20000000) that cause periodic USB resets.
# JACK opening the PCM is sufficient to switch the device to USB mode (green LED).
options snd-usb-audio vid=0x1235 pid=0x8219 device_setup=1
