# Use the built-in Scarlett Gen4 driver from snd-usb-audio for proper device
# initialization. The quirk_alias=0x12358219:0x00000000 approach forced the
# generic UAC driver which caused JACK to fail with "Broken pipe" on RK3588.
#
# device_setup=0 disables the scarlett2_notify subscription that triggered
# USB resets on the RK3588 xHCI controller.
options snd-scarlett-gen2 device_setup=0
