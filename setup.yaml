id: default-setup
name: Default Setup
input_devices:
  - id: scarlett_in_dev
    match_name: "Scarlett 2i2 4th Gen"
    sample_rate: 48000
    buffer_size_frames: 256
output_devices:
  - id: scarlett_out_dev
    match_name: "Scarlett 2i2 4th Gen"
    sample_rate: 48000
    buffer_size_frames: 256
inputs:
  - id: scarlett_stereo
    device_id: scarlett_in_dev
    channels: [0, 1]
  - id: scarlett_mono_1
    device_id: scarlett_in_dev
    channels: [0]
  - id: scarlett_mono_2
    device_id: scarlett_in_dev
    channels: [1]
outputs:
  - id: scarlett_out
    device_id: scarlett_out_dev
    channels: [0, 1]
tracks:
